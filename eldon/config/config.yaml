# EldonOpenClaw — canonical config.yaml
# Non-secret settings. Secrets go in /etc/openclaw/openclaw.env (never committed).
#
# LLM_PROVIDER controls routing. Only the key for the selected provider is needed.
# Valid: minimax | openrouter | openai | xai | none
#
# OPENAI_BASE_URL is only honoured when LLM_PROVIDER=openai.
# It does NOT route traffic to MiniMax when LLM_PROVIDER=minimax.

app:
  env: ${OPENCLAW_ENV:production}
  log_level: ${OPENCLAW_LOG_LEVEL:info}

llm:
  # Active provider for this deployment: minimax
  # Change LLM_PROVIDER in /etc/openclaw/openclaw.env to switch.
  provider: ${LLM_PROVIDER:minimax}
  chat_model: ${OPENCLAW_CHAT_MODEL:MiniMax-M1-mini}
  embedding_model: ${OPENCLAW_EMBED_MODEL:}
  # base_url: used ONLY when provider=openai (for self-hosted/local endpoints).
  # Leave empty for all other providers — their URLs are hardcoded in provider_resolution.py.
  base_url: ${OPENAI_BASE_URL:}

memory:
  enabled: ${OPENCLAW_MEMORY_ENABLED:false}
  vector_store: ${OPENCLAW_VECTOR_STORE:local}
  vector_store_path: ${OPENCLAW_VECTOR_STORE_PATH:.data/vector_store}

connectors:
  cli: ${OPENCLAW_CONNECTOR_CLI:true}
  telegram: ${OPENCLAW_CONNECTOR_TELEGRAM:false}
  voice: ${OPENCLAW_CONNECTOR_VOICE:false}

health:
  enabled: true
  host: 0.0.0.0
  port: 8080

actions:
  require_confirm: ${OPENCLAW_ACTION_CONFIRM:true}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OpenClaw Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Fragment+Mono:ital@0;1&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>

/* ═══════════════════════════════════════════════════════════════
   OPENCLAW MISSION CONTROL v5 — Precision Instrument Design
   Typography: Space Grotesk + Fragment Mono + Bebas Neue
   Palette: Obsidian / Amber / Terminal
   ═══════════════════════════════════════════════════════════════ */
:root{
  --void:#050507;--bg:#08080d;--bg2:#0c0d14;--bg3:#10111a;--bg4:#151621;--bg5:#1a1c2c;--bg6:#1f2235;
  --wire:#1c1e2e;--wire2:#242640;--wire3:#2e3050;
  --ink:#e8eaf5;--ink2:#9196b8;--ink3:#555a7a;--ink4:#2c3050;
  --amber:#f5a623;--amber2:#ffbe4f;--amber3:rgba(245,166,35,.12);--amber4:rgba(245,166,35,.06);
  --green:#00d084;--green2:rgba(0,208,132,.12);
  --red:#ff4455;--red2:rgba(255,68,85,.12);
  --blue:#4488ff;--blue2:rgba(68,136,255,.1);
  --purple:#a855f7;--purple2:rgba(168,85,247,.1);
  --sans:'Space Grotesk',sans-serif;--mono:'Fragment Mono',monospace;--display:'Bebas Neue',sans-serif;
  --r1:4px;--r2:8px;--r3:12px;--r4:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:13px;overflow:hidden;-webkit-font-smoothing:antialiased;line-height:1}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.008) 2px,rgba(255,255,255,.008) 4px);pointer-events:none;z-index:1000}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--wire2);border-radius:2px}
/* SHELL */
.shell{display:grid;grid-template-columns:56px 240px 1fr;height:100vh;overflow:hidden}
/* RAIL */
.rail{background:var(--void);border-right:1px solid var(--wire);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:2px;position:relative;z-index:20}
.rail::after{content:'';position:absolute;top:0;right:-1px;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,var(--amber) 30%,var(--amber) 70%,transparent);opacity:.15}
.rl{width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:12px;cursor:pointer;filter:drop-shadow(0 0 8px rgba(245,166,35,.4));transition:filter .2s;flex-shrink:0}
.rl:hover{filter:drop-shadow(0 0 18px rgba(245,166,35,.7))}
.rs{width:20px;height:1px;background:var(--wire2);margin:5px 0;flex-shrink:0}
.rb{width:36px;height:36px;border-radius:var(--r2);border:none;background:transparent;color:var(--ink4);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .14s;position:relative;flex-shrink:0}
.rb:hover{background:var(--bg4);color:var(--ink2)}
.rb.on{background:var(--amber3);color:var(--amber);box-shadow:0 0 0 1px rgba(245,166,35,.2) inset}
.rb .dot{position:absolute;top:4px;right:4px;width:5px;height:5px;background:var(--amber);border-radius:50%;box-shadow:0 0 6px var(--amber)}
.rsp{flex:1}
/* SIDEBAR */
.sb{background:var(--bg2);border-right:1px solid var(--wire);display:flex;flex-direction:column;overflow:hidden}
.sbh{padding:16px 16px 12px;border-bottom:1px solid var(--wire);flex-shrink:0;background:linear-gradient(180deg,var(--bg3),var(--bg2))}
.sbht{font-family:var(--display);font-size:13px;letter-spacing:.12em;color:var(--ink3);text-transform:uppercase}
.sbhc{font-family:var(--mono);font-size:9px;color:var(--ink4);margin-top:4px}
.sbsrch{padding:8px 10px;border-bottom:1px solid var(--wire);flex-shrink:0}
.sbsrch input{width:100%;background:var(--bg4);border:1px solid var(--wire2);border-radius:var(--r1);padding:6px 10px;color:var(--ink);font-family:var(--mono);font-size:11px;outline:none;transition:border-color .15s,box-shadow .15s}
.sbsrch input:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(245,166,35,.08)}
.sbsrch input::placeholder{color:var(--ink4)}
.sbl{flex:1;overflow-y:auto;padding:4px 0}
.si{display:flex;align-items:center;gap:9px;padding:9px 14px;cursor:pointer;border-left:2px solid transparent;transition:background .1s,border-color .12s;min-width:0;position:relative}
.si:hover{background:var(--bg3)}
.si.on{background:linear-gradient(90deg,var(--amber3),transparent);border-left-color:var(--amber)}
.sav{width:28px;height:28px;background:var(--bg5);border-radius:var(--r2);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:1px solid var(--wire2)}
.sn{font-family:var(--sans);font-size:12px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.ss{font-family:var(--mono);font-size:9px;color:var(--ink4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.f1{flex:1;min-width:0}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--ink4);flex-shrink:0}
.sdot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.sdot.ac{background:var(--amber);box-shadow:0 0 6px var(--amber)}
.sdot.yw{background:var(--amber)}
.sbadd{margin:6px 10px 10px;width:calc(100% - 20px);background:transparent;border:1px dashed var(--wire2);border-radius:var(--r2);color:var(--ink4);font-family:var(--mono);font-size:10px;padding:8px;cursor:pointer;transition:all .15s;text-align:center;letter-spacing:.05em;text-transform:uppercase}
.sbadd:hover{border-color:var(--amber);color:var(--amber);background:var(--amber4)}
/* MAIN */
.mn{display:flex;flex-direction:column;overflow:hidden;min-width:0}
.tb{background:linear-gradient(180deg,var(--bg3),var(--bg2));border-bottom:1px solid var(--wire);padding:0 20px;height:48px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.tbt{font-family:var(--display);font-size:18px;letter-spacing:.08em;color:var(--ink);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ct{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
/* PILLS */
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;flex-shrink:0}
.po{background:var(--green2);color:var(--green);border:1px solid rgba(0,208,132,.2)}
.pd{background:rgba(85,90,122,.1);color:var(--ink3);border:1px solid var(--wire)}
.pde{background:var(--red2);color:var(--red);border:1px solid rgba(255,68,85,.2)}
.pw{background:rgba(245,166,35,.1);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
.pb{background:var(--blue2);color:var(--blue);border:1px solid rgba(68,136,255,.2)}
.pp{background:var(--purple2);color:var(--purple);border:1px solid rgba(168,85,247,.2)}
/* TABS */
.tr{display:flex;gap:1px;background:var(--wire);border-radius:var(--r2);padding:2px;width:fit-content;flex-wrap:wrap}
.ta{padding:6px 14px;border-radius:6px;border:none;background:transparent;color:var(--ink4);font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .12s;white-space:nowrap;letter-spacing:.04em;text-transform:uppercase}
.ta:hover{color:var(--ink2);background:var(--bg4)}
.ta.on{background:var(--bg5);color:var(--amber);box-shadow:0 0 0 1px rgba(245,166,35,.15) inset}
/* CARDS */
.card{background:var(--bg2);border:1px solid var(--wire);border-radius:var(--r3);overflow:hidden;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--wire3) 50%,transparent);pointer-events:none}
.ch{padding:13px 16px 10px;border-bottom:1px solid var(--wire);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;background:linear-gradient(180deg,var(--bg3),transparent)}
.cht{font-family:var(--display);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3)}
.cb{padding:16px}
/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:1200px){.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.g2,.g3{grid-template-columns:1fr}}
/* STAT */
.stat{background:var(--bg3);border:1px solid var(--wire);border-radius:var(--r2);padding:14px 16px;position:relative;overflow:hidden}
.stat::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--wire)}
.stl,.stat-label{font-family:var(--mono);font-size:9px;color:var(--ink4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.stv,.stat-value{font-family:var(--display);font-size:26px;letter-spacing:.03em;line-height:1;color:var(--ink)}
.sts,.stat-sub{font-family:var(--mono);font-size:9px;color:var(--ink4);margin-top:5px}
.cgr{color:var(--green)}.cre{color:var(--red)}.cyw{color:var(--amber)}.cbl{color:var(--blue)}.cpu{color:var(--purple)}
/* KV */
.kv{display:grid;grid-template-columns:150px 1fr;gap:8px 12px;align-items:baseline}
.kl{font-family:var(--mono);font-size:9px;color:var(--ink4);text-transform:uppercase;letter-spacing:.07em}
.kv-v,.kvv{font-family:var(--mono);font-size:11px;color:var(--ink);word-break:break-all}
/* FORM */
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-family:var(--mono);font-size:9px;color:var(--ink4);text-transform:uppercase;letter-spacing:.08em}
.field input,.field select,.field textarea{background:var(--bg4);border:1px solid var(--wire2);border-radius:var(--r1);padding:8px 10px;color:var(--ink);font-family:var(--mono);font-size:11px;outline:none;width:100%;transition:border-color .15s,box-shadow .15s;appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(245,166,35,.08)}
.field textarea{resize:vertical;min-height:80px;line-height:1.6}
.field input::placeholder,.field textarea::placeholder{color:var(--ink4)}
.field select option{background:var(--bg4)}
/* BUTTONS */
.btn{padding:7px 14px;border-radius:var(--r1);border:1px solid var(--wire2);background:var(--bg4);color:var(--ink2);font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .13s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;flex-shrink:0;letter-spacing:.03em;text-transform:uppercase}
.btn:hover:not(:disabled){background:var(--bg5);color:var(--ink);border-color:var(--wire3)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btp{background:var(--amber);color:var(--void);border-color:var(--amber);font-weight:700}
.btp:hover:not(:disabled){background:var(--amber2);border-color:var(--amber2);box-shadow:0 0 20px rgba(245,166,35,.3)}
.btd{background:var(--red2);color:var(--red);border-color:rgba(255,68,85,.25)}
.btd:hover:not(:disabled){background:rgba(255,68,85,.2)}
.bto{background:var(--green2);color:var(--green);border-color:rgba(0,208,132,.25)}
.bto:hover:not(:disabled){background:rgba(0,208,132,.2)}
.btn-sm,.bts{padding:4px 10px;font-size:9px}
.br{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.row{display:flex;gap:8px;align-items:center}
.col{display:flex;flex-direction:column;gap:10px}
/* STATUS */
.srow{display:flex;align-items:center;gap:6px}
.sdot2{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sdot2.gr{background:var(--green);box-shadow:0 0 8px var(--green)}
.sdot2.re{background:var(--red);box-shadow:0 0 8px var(--red)}
.sdot2.yw{background:var(--amber);animation:apulse 1.4s infinite}
@keyframes apulse{0%,100%{opacity:1;box-shadow:0 0 6px var(--amber)}50%{opacity:.4;box-shadow:none}}
.spin{display:inline-block;width:12px;height:12px;border:1.5px solid var(--wire2);border-top-color:var(--amber);border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
/* FILE BROWSER */
.fl{display:flex;flex-direction:column;gap:1px}
.fr{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r1);cursor:pointer;transition:background .1s}
.fr:hover{background:var(--bg4)}.fr.on{background:var(--bg5);box-shadow:0 0 0 1px rgba(245,166,35,.15) inset}
.fn{font-family:var(--mono);font-size:11px;color:var(--ink);flex:1}.fm{font-family:var(--mono);font-size:9px;color:var(--ink4)}
.ea{background:var(--bg4);border:1px solid var(--wire2);border-radius:var(--r1);padding:12px;color:var(--ink);font-family:var(--mono);font-size:11px;line-height:1.7;min-height:280px;outline:none;resize:vertical;width:100%;tab-size:2}
.ea:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(245,166,35,.08)}
/* TOOL GRID */
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:8px;margin-top:8px}
.ti{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;background:var(--bg3);border:1px solid var(--wire);border-radius:var(--r2);transition:border-color .12s}
.ti:hover{border-color:var(--wire2)}
.tn{font-family:var(--mono);font-size:10px;color:var(--ink2)}.td{font-family:var(--mono);font-size:9px;color:var(--ink4);margin-top:1px}
.tog{width:32px;height:18px;background:var(--wire2);border-radius:9px;position:relative;cursor:pointer;border:none;transition:background .2s;flex-shrink:0}
.tog.on{background:var(--amber)}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:12px;height:12px;background:#fff;border-radius:50%;transition:transform .18s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tog.on::after{transform:translateX(14px)}
/* CRON */
.ci{background:var(--bg3);border:1px solid var(--wire);border-radius:var(--r2);padding:12px 14px;display:flex;align-items:flex-start;gap:12px}
.cnm{font-size:12px;font-weight:600;color:var(--ink)}.csc{font-family:var(--mono);font-size:10px;color:var(--ink4);margin-top:3px}
.cde{font-size:10px;color:var(--ink2);margin-top:3px}.cm{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.cst{display:grid;grid-template-columns:auto 1fr;gap:3px 10px;font-size:9px;margin-top:7px}
.cst .cl{color:var(--ink4);font-family:var(--mono);text-transform:uppercase;letter-spacing:.07em}.cst .cv{color:var(--ink);font-family:var(--mono)}
/* RUN LOG */
.rl-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg3);border:1px solid var(--wire);border-radius:var(--r1)}
.rl-ts{font-family:var(--mono);font-size:9px;color:var(--ink4);flex-shrink:0;min-width:75px}
.rl-dur{font-family:var(--mono);font-size:9px;color:var(--ink2);flex-shrink:0;min-width:45px;text-align:right}
.rl-summary{font-family:var(--mono);font-size:10px;color:var(--ink2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rl-err{font-family:var(--mono);font-size:9px;color:var(--red);margin-top:2px}
.bar-wrap{height:3px;background:var(--wire);border-radius:2px;overflow:hidden;margin-top:4px}
.bar-fill{height:100%;border-radius:2px;transition:width .3s}
/* SESSIONS */
.sesi{display:flex;align-items:flex-start;gap:10px;padding:10px 11px;background:var(--bg3);border:1px solid var(--wire);border-radius:var(--r2);cursor:pointer;transition:border-color .12s}
.sesi:hover{border-color:var(--wire2)}.sesi.on{border-color:var(--amber);background:var(--amber4)}
.sesk{font-family:var(--mono);font-size:10px;color:var(--ink2);flex:1;word-break:break-all}.sesm{font-family:var(--mono);font-size:9px;color:var(--ink4);margin-top:3px}
.prev-item{padding:8px 10px;border-radius:var(--r1);font-family:var(--mono);font-size:10px;line-height:1.6;margin-top:4px}
.prev-item.user{background:var(--blue2);border-left:2px solid var(--blue);color:var(--ink2)}
.prev-item.assistant{background:var(--green2);border-left:2px solid var(--green);color:var(--ink2)}
/* NODES */
.node-card{background:var(--bg3);border:1px solid var(--wire);border-radius:var(--r2);padding:11px 13px;display:flex;align-items:flex-start;gap:11px;cursor:pointer;transition:border-color .12s}
.node-card:hover{border-color:var(--wire2)}.node-card.on{border-color:var(--amber);background:var(--amber4)}
.node-icon{width:34px;height:34px;background:var(--bg5);border-radius:var(--r2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:1px solid var(--wire2)}
.cap{font-family:var(--mono);font-size:8px;background:var(--bg5);color:var(--ink3);border:1px solid var(--wire2);border-radius:3px;padding:1px 5px;text-transform:uppercase;letter-spacing:.05em}
/* LOGS */
.log-wrap{background:var(--void);border:1px solid var(--wire);border-radius:var(--r2);overflow:hidden;font-family:var(--mono)}
.log-bar{padding:9px 12px;border-bottom:1px solid var(--wire);display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--bg2)}
.log-out{height:380px;overflow-y:auto;padding:10px 14px;font-size:10px;line-height:1.6}
.ll{margin-bottom:2px;white-space:pre-wrap;word-break:break-all}
.ll.info{color:var(--ink3)}.ll.warn{color:var(--amber)}.ll.error,.ll.fatal{color:var(--red)}.ll.debug,.ll.trace{color:var(--ink4)}
.ll .ts{color:var(--ink4);margin-right:8px}.ll .lv{margin-right:6px;font-weight:600}.ll .sub{color:var(--purple);margin-right:6px}
/* USAGE */
.daily-row{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--wire)}
.d-date{font-family:var(--mono);font-size:10px;color:var(--ink4);width:82px;flex-shrink:0}
.d-cost{font-family:var(--mono);font-size:10px;width:70px;text-align:right;flex-shrink:0}
.d-tok{font-family:var(--mono);font-size:9px;color:var(--ink4);width:72px;text-align:right;flex-shrink:0}
/* SKILLS */
.ski{display:flex;align-items:flex-start;gap:10px;padding:10px 11px;background:var(--bg3);border:1px solid var(--wire);border-radius:var(--r2)}
.skn{font-size:12px;font-weight:600;color:var(--ink)}.skd{font-size:10px;color:var(--ink2);margin-top:3px}.skm{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
/* EXEC APPROVALS */
.eal{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--bg3);border:1px solid var(--wire);border-radius:var(--r1)}
.eap{font-family:var(--mono);font-size:11px;color:var(--ink);flex:1;word-break:break-all}.eam{font-family:var(--mono);font-size:9px;color:var(--ink4);margin-top:2px}
/* AUDIT */
.aitem{display:flex;gap:10px;padding:7px 10px;border-radius:var(--r1);font-size:10px;color:var(--ink2);border-left:2px solid transparent;transition:background .1s}
.aitem:hover{background:var(--bg3)}.aitem.create{border-left-color:var(--green)}.aitem.update{border-left-color:var(--blue)}.aitem.delete{border-left-color:var(--red)}.aitem.event{border-left-color:var(--amber)}
.ats{font-family:var(--mono);color:var(--ink4);flex-shrink:0;font-size:9px;min-width:55px}.ame{font-family:var(--mono);font-weight:600;color:var(--ink);font-size:10px}
/* CALLOUTS */
.callout{padding:10px 14px;border-radius:var(--r2);font-family:var(--mono);font-size:10px;line-height:1.65}
.callout.info{background:var(--blue2);border:1px solid rgba(68,136,255,.2);color:#8ab4ff}
.callout.warn{background:var(--amber4);border:1px solid rgba(245,166,35,.2);color:var(--amber)}
.callout.err{background:var(--red2);border:1px solid rgba(255,68,85,.2);color:var(--red)}
.callout.ok{background:var(--green2);border:1px solid rgba(0,208,132,.2);color:var(--green)}
/* MODAL */
.ov{position:fixed;inset:0;background:rgba(5,5,7,.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:200}
.mo{background:var(--bg3);border:1px solid var(--wire2);border-radius:var(--r3);padding:24px;width:540px;max-width:93vw;max-height:85vh;overflow-y:auto;display:flex;flex-direction:column;gap:16px;box-shadow:0 32px 80px rgba(0,0,0,.7),0 0 0 1px rgba(245,166,35,.05)}

// ── GATEWAY CLIENT ──────────────────────────────────────────────
class GW {
  constructor(url,tok){this.url=url;this.tok=tok;this.ws=null;this.pend=new Map();this.seq=0;this.evts=new Map();this.ok=false;}
  on(ev,fn){if(!this.evts.has(ev))this.evts.set(ev,new Set());this.evts.get(ev).add(fn);return()=>this.evts.get(ev)?.delete(fn);}
  emit(ev,d){this.evts.get(ev)?.forEach(fn=>fn(d));}
  connect(){
    return new Promise((res,rej)=>{
      try{this.ws=new WebSocket(this.url);}catch(e){rej(new Error('Invalid URL'));return;}
      const t=setTimeout(()=>{this.ws?.close();rej(new Error('Connect timeout (45s)'));},45000);
      this.ws.onopen=()=>{
        const connSeq=++this.seq;this._connSeq=connSeq;
        this.ws.send(JSON.stringify({type:'request',seq:connSeq,method:'connect',params:{
          minProtocol:1,maxProtocol:99,
          client:{id:'mc5-'+Math.random().toString(36).slice(2),displayName:'Mission Control v5',version:'3.0.0',platform:'browser',mode:'ui'},
          ...(this.tok?{auth:{token:this.tok}}:{})
        }}));
      };
      this.ws.onmessage=(e)=>{
        try{
          const m=JSON.parse(e.data);
          if(m.type==='response'&&m.seq===this._connSeq&&!this.ok){
            clearTimeout(t);
            if(m.ok){this.ok=true;res(this);this.emit('connect',{});}
            else{this.ws?.close();rej(new Error(m.error?.message||'Auth rejected'));}
            return;
          }
          if(m.type==='response'&&m.seq){const p=this.pend.get(m.seq);if(p){this.pend.delete(m.seq);m.ok?p.res(m.result):p.rej(new Error(m.error?.message||'Request failed'));}}
          else if(m.type==='event')this.emit('event',m);
        }catch{}
      };
      this.ws.onerror=(e)=>{clearTimeout(t);this.emit('error',e);rej(new Error('WebSocket error'));};
      this.ws.onclose=(e)=>{this.ok=false;this.pend.forEach(p=>p.rej(new Error('Disconnected')));this.pend.clear();this.emit('disconnect',{code:e.code,reason:e.reason});};
    });
  }
  req(method,params={}){
    return new Promise((res,rej)=>{
      if(!this.ws||this.ws.readyState!==WebSocket.OPEN){rej(new Error('Not connected'));return;}
      const seq=++this.seq;this.pend.set(seq,{res,rej});
      this.ws.send(JSON.stringify({type:'request',seq,method,params}));
      setTimeout(()=>{if(this.pend.has(seq)){this.pend.delete(seq);rej(new Error('Timeout'));}},18000);
    });
  }
  disconnect(){this.ws?.close();this.ws=null;this.ok=false;}
}

// ── CONFIG PATCH — correct RFC7396 strategy ───────────────────
// The config uses applyMergePatch (RFC7396). Arrays are REPLACED, never merged.
// To patch agents.list[id=X].tools, we must:
//   1. Parse configRaw to get the full agents.list array
//   2. Find+update the specific entry
//   3. Send the entire agents object in the patch
//
// This function takes the raw config JSON, an agentId, and a partial AgentConfig,
// and returns a safe patch object that only touches that agent.
function buildAgentPatch(configRaw, agentId, agentUpdate) {
  let parsed = {};
  try { parsed = JSON.parse(configRaw || '{}'); } catch { try { parsed = eval('(' + (configRaw||'{}') + ')'); } catch {} }
  const currentList = Array.isArray(parsed?.agents?.list) ? parsed.agents.list : [];
  const idx = currentList.findIndex(e => e?.id === agentId || e?.id?.toLowerCase() === agentId.toLowerCase());
  const updatedList = [...currentList];
  if (idx >= 0) {
    updatedList[idx] = { ...updatedList[idx], ...agentUpdate };
  } else {
    updatedList.push({ id: agentId, ...agentUpdate });
  }
  // Return the minimal patch: only touch agents.list
  return { agents: { ...(parsed.agents || {}), list: updatedList } };
}

        h('button',{className:'btn bts',onClick:()=>{const a={};MTOOLS.forEach(t=>a[t.id]=false);setToolsEnabled(a);}},'All Off')
      )
    ),

      showDiff&&h('div',{style:{marginBottom:12}},
        h('div',{style:{fontSize:10,color:'var(--t3)',marginBottom:6}},'Patch preview — what will be written via config.patch (RFC7396, full agents.list replace):'),
        h('div',{className:'config-raw'},jsonFmt(buildAgentPatch(configRaw||'{}',agentId,previewPatch)))
      ),
      !showDiff&&h('div',{className:'callout info',style:{marginBottom:12,fontSize:10}},
        '⚠ Uses ',h('code',null,'config.patch'),' with RFC7396 merge-patch. Arrays are replaced wholesale — the full ',h('code',null,'agents.list'),' is sent to avoid clobbering other agents. baseHash guard is required.'

// ── SKILLS PANEL ─────────────────────────────────────────────────
function SkillsPanel({agentId,client,isDemo}){
  const[report,setReport]=useState(null);
  const[loading,setLoading]=useState(false);
  const[installing,setInstalling]=useState('');
  const[updating,setUpdating]=useState('');
  const[msg,setMsg]=useState({});
  const[filter,setFilter]=useState('');

  const load=useCallback(async()=>{
    setLoading(true);setReport(null);setMsg({});
    if(isDemo){setReport({workspaceDir:`~/.openclaw/agents/${agentId}`,managedSkillsDir:'~/.openclaw/skills',skills:MSKILLS});setLoading(false);return;}
    if(!client){setLoading(false);return;}
    try{const r=await client.req('skills.status',{agentId});setReport(r);}
    catch{setReport({workspaceDir:'-',managedSkillsDir:'-',skills:MSKILLS});}
    setLoading(false);
  },[agentId,client,isDemo]);

  useEffect(()=>{load();},[load]);

  const toggleSkill=async(skillKey,enabled)=>{
    setUpdating(skillKey);
    const prev=msg;
    try{
      if(!isDemo&&client)await client.req('skills.update',{skillKey,enabled});
      pushA('update','skills.update',`${skillKey} enabled=${enabled}`);
      setReport(r=>r?{...r,skills:r.skills.map(s=>s.skillKey===skillKey?{...s,disabled:!enabled}:s)}:r);
      setMsg(m=>({...m,[skillKey]:'✓'}));
    }catch(e){setMsg(m=>({...m,[skillKey]:'Error: '+e.message}));}
    setUpdating('');
  };

      if(!isDemo&&client)await client.req('skills.update',{skillKey,apiKey:key});

      setMsg(m=>({...m,[skillKey]:'API key saved ✓'}));
    }catch(e){setMsg(m=>({...m,[skillKey]:'Error: '+e.message}));}

    h('div',{className:'ch'},h('span',{className:'cht'},'Skills'),h('div',{className:'row',style:{gap:6}},h('span',{className:'pill po'},`${report.skills.filter(s=>!s.disabled).length} active`),h('button',{className:'btn bts',onClick:load,disabled:loading},'Refresh'))),
    h('div',{className:'cb'},
      h('div',{className:'row',style:{marginBottom:12,gap:6}},
        h('div',{className:'field',style:{flex:1}},h('label',null,'Filter'),h('input',{value:filter,onChange:e=>setFilter(e.target.value),placeholder:'Search skills…'})),
        h('span',{style:{fontSize:10,color:'var(--t3)',alignSelf:'flex-end',paddingBottom:2}},`${filtered.length}/${report.skills.length}`)
      ),
      filtered.length===0?h('div',{className:'emp'},h('div',{className:'emps'},'No skills match filter'))
      :h('div',{className:'col',style:{gap:8}},
        filtered.map(skill=>h(SkillRow,{key:skill.skillKey||skill.name,skill,msg:msg[skill.skillKey||skill.name],onToggle:toggleSkill,onApiKey:setApiKey,onInstall:installSkill,updating:updating===skill.skillKey,installing:installing.startsWith(skill.name+':')}))

// ── CONFIG SCHEMA FORM ────────────────────────────────────────────
// Renders a subset of gateway config using the config.schema response.
// Shows the top-level gateway fields with type-appropriate inputs.
// On save: constructs a minimal merge patch (deep objects only, no arrays unless necessary).
function ConfigSchemaForm({configRaw,configHash,configSchema,client,isDemo,onRefresh}){
  const[vals,setVals]=useState({});
  const[saving,setSaving]=useState(false);
  const[msg,setMsg]=useState('');
  const[rawMode,setRawMode]=useState(false);
  const[rawEdit,setRawEdit]=useState('');
  const[schemaLoading,setSchemaLoading]=useState(false);
  const[schema,setSchema]=useState(configSchema);

  useEffect(()=>{
    if(configRaw){
      let parsed={};
      try{parsed=JSON.parse(configRaw);}catch{}
      // Prime editable fields from current config
      setVals({
        'gateway.controlUi.allowedOrigins':(parsed.gateway?.controlUi?.allowedOrigins||[]).join(', '),
        'gateway.auth.mode':parsed.gateway?.auth?.mode||'',
        'agents.defaults.model':typeof parsed.agents?.defaults?.model==='string'?parsed.agents.defaults.model:(parsed.agents?.defaults?.model?.primary||''),
        'cron.enabled':String(parsed.cron?.enabled!==false),
        'cron.maxConcurrentRuns':String(parsed.cron?.maxConcurrentRuns||''),
        'hooks.enabled':String(parsed.hooks?.enabled!==false),
      });
      setRawEdit(configRaw);
    }
  },[configRaw]);

  const loadSchema=async()=>{
    setSchemaLoading(true);
    if(!isDemo&&client){try{const r=await client.req('config.schema',{});setSchema(r);}catch{}}
    setSchemaLoading(false);
  };

  const saveRaw=async()=>{
    setSaving(true);setMsg('');
    try{
      JSON.parse(rawEdit);// validate JSON
      if(!isDemo&&client){
        await client.req('config.patch',{raw:rawEdit,baseHash:configHash||undefined,note:'MC: raw config patch'});
        pushA('update','config.patch','raw config edit');
        if(onRefresh)onRefresh();
      } else {pushA('update','config.patch','raw config edit (demo)');}
      setMsg('Config patched ✓');
    }catch(e){setMsg('Error: '+e.message);}
    setSaving(false);
  };

  const saveForm=async()=>{
    setSaving(true);setMsg('');
    // Build a safe, non-array-replacing patch from form values
    // We only send top-level scalar/object paths — no arrays
    const patch={};
    if(vals['gateway.auth.mode']){
      patch.gateway={...patch.gateway,auth:{...patch.gateway?.auth,mode:vals['gateway.auth.mode']}};
    }
    if(vals['agents.defaults.model']){
      patch.agents={...patch.agents,defaults:{...patch.agents?.defaults,model:vals['agents.defaults.model']}};
    }
    if(vals['cron.enabled']!==undefined){
      patch.cron={...patch.cron,enabled:vals['cron.enabled']==='true'};
    }
    if(vals['cron.maxConcurrentRuns']&&!isNaN(parseInt(vals['cron.maxConcurrentRuns']))){
      patch.cron={...patch.cron,maxConcurrentRuns:parseInt(vals['cron.maxConcurrentRuns'])};
    }
    if(vals['hooks.enabled']!==undefined){
      patch.hooks={...patch.hooks,enabled:vals['hooks.enabled']==='true'};
    }
    try{
      if(!isDemo&&client&&configHash){
        await client.req('config.patch',{raw:JSON.stringify(patch),baseHash:configHash,note:'MC: form config patch'});
        pushA('update','config.patch',`form patch: ${Object.keys(patch).join(', ')}`);
        if(onRefresh)onRefresh();
      } else {pushA('update','config.patch','form patch (demo)');}
      setMsg('Config patched ✓');
    }catch(e){setMsg('Error: '+e.message);}
    setSaving(false);
  };

  const FORM_FIELDS=[
    {key:'gateway.auth.mode',label:'Auth Mode',type:'select',opts:['','token','password','none']},
    {key:'agents.defaults.model',label:'Default Agent Model',type:'text',ph:'anthropic/claude-opus-4-6'},
    {key:'cron.enabled',label:'Cron Enabled',type:'select',opts:['true','false']},
    {key:'cron.maxConcurrentRuns',label:'Cron Max Concurrent',type:'text',ph:'2'},
    {key:'hooks.enabled',label:'Hooks Enabled',type:'select',opts:['true','false']},
  ];

  return h('div',{className:'card'},
    h('div',{className:'ch'},h('span',{className:'cht'},'Config Editor'),
      h('div',{className:'row',style:{gap:6}},
        configHash&&h('span',{className:'pill pd',style:{fontSize:9}},`hash: ${configHash.slice(0,8)}`),
        h('button',{className:'btn bts',onClick:()=>setRawMode(!rawMode)},rawMode?'Form View':'Raw JSON'),
        h('button',{className:'btn bts',onClick:loadSchema,disabled:schemaLoading},'Load Schema'),
        h('button',{className:'btn bts',onClick:onRefresh},'Reload Config')
      )
    ),
    h('div',{className:'cb'},
      msg&&h('div',{className:`callout ${msg.startsWith('Error')?'err':'ok'}`,style:{marginBottom:12}},msg),
      !configRaw&&h('div',{className:'callout warn',style:{marginBottom:12}},'Config not loaded. Connect to gateway or reload.'),
      schema&&h('div',{className:'callout info',style:{marginBottom:12,fontSize:10}},`Config schema loaded · version ${schema.version||'?'} · ${Object.keys(schema.uiHints||{}).length} UI hints`),
      rawMode?h(Fragment,null,
        h('div',{className:'callout warn',style:{marginBottom:10,fontSize:10}},'⚠ Raw patch mode. The ',h('code',null,'raw'),' field is parsed as JSON, then RFC7396-merged with the current config. Arrays replace — do not include ',h('code',null,'agents.list'),' unless you intend to replace it entirely.'),
        h('textarea',{className:'ea',value:rawEdit,onChange:e=>setRawEdit(e.target.value),style:{minHeight:200,fontSize:10}}),
        h('div',{className:'br',style:{justifyContent:'flex-end',marginTop:10}},h('button',{className:'btn btp',onClick:saveRaw,disabled:saving||!configHash&&!isDemo},saving?'Saving…':'Patch Config (Raw)'))
      ):h(Fragment,null,
        h('div',{className:'callout info',style:{marginBottom:12,fontSize:10}},'Scalar and object-only fields. Safe — no arrays replaced. Each field maps directly to its config path.'),
        h('div',{className:'g2',style:{gap:10}},
          FORM_FIELDS.map(f=>h('div',{key:f.key,className:'field'},
            h('label',null,f.label),
            f.type==='select'
              ?h('select',{value:vals[f.key]||'',onChange:e=>setVals(p=>({...p,[f.key]:e.target.value}))},f.opts.map(o=>h('option',{key:o,value:o},o||'(unset)')))
              :h('input',{value:vals[f.key]||'',onChange:e=>setVals(p=>({...p,[f.key]:e.target.value})),placeholder:f.ph||''})
          ))
        ),
        configRaw&&h('div',{style:{marginTop:10}},
          h('div',{style:{fontSize:10,color:'var(--t3)',marginBottom:4}},'Current config snapshot:'),
          h('div',{className:'config-raw'},configRaw.slice(0,600)+(configRaw.length>600?'\n…':''  ))
        ),
        h('div',{className:'br',style:{justifyContent:'flex-end',marginTop:10}},h('button',{className:'btn btp',onClick:saveForm,disabled:saving||!configRaw},saving?'Saving…':'Patch Config'))
      )
    )
  );
}

function parseLogLine(raw){
  try{
    const p=JSON.parse(raw);
    const meta=p._meta||{};
    let subsystem='';
    try{const nm=JSON.parse(meta.name||'{}');subsystem=nm.subsystem||'';}catch{}
    const level=(meta.logLevelName||'info').toLowerCase();
    const msg=Object.keys(p).filter(k=>/^\d+$/.test(k)).map(k=>p[k]).join(' ')||p.message||raw;
    const time=typeof p.time==='string'?p.time.slice(11,23):'';
    return{raw,time,level,subsystem,message:msg};
  }catch{return{raw,time:'',level:'info',subsystem:'',message:raw};}
}

// ── CronRunHistory — cron.runs {id, limit} → {entries} ───────────
function CronRunHistory({jobId,client,isDemo}){
  const[entries,setEntries]=useState(null);
  const[loading,setLoading]=useState(false);
  const load=useCallback(async()=>{
    setLoading(true);
    if(isDemo){setTimeout(()=>{setEntries(MCRON_RUNS[jobId]||[]);setLoading(false);},250);return;}
    try{const r=await client.req('cron.runs',{id:jobId,limit:50});setEntries(r.entries||[]);setErr('');}
    catch{setEntries([]);}
    setLoading(false);
  },[jobId,client,isDemo]);
  useEffect(()=>{load();},[load]);
  if(loading&&entries===null)return h('div',{className:'row',style:{padding:8,gap:6}},h('span',{className:'spin'}),h('span',{style:{fontSize:10,color:'var(--t3)'}},'Loading run history…'));

  const maxDur=Math.max(...entries.map(e=>e.durationMs||0),1);
  return h('div',{className:'col',style:{gap:5}},
    h('div',{className:'row',style:{justifyContent:'space-between',marginBottom:2}},
      h('span',{style:{fontSize:9,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.07em'}},'Run History'),
      h('button',{className:'btn btn-sm',onClick:load,disabled:loading},'Refresh')
    ),
    entries.map((e,i)=>h('div',{key:i,className:'rl-item'},
      h('div',{className:`sdot ${e.status==='ok'?'on':e.status==='error'?'acc':'yellow'}`}),
      h('div',{className:'rl-ts'},fmtT(e.ts)),
      h('div',{className:'rl-dur',style:{color:e.status==='error'?'var(--acc)':e.status==='ok'?'var(--gr2)':'var(--t2)'}},e.durationMs?fmtMs(e.durationMs):'-'),
      h('div',{style:{flex:1,minWidth:0}},
        e.summary&&h('div',{className:'rl-summary',title:e.summary},e.summary),

// ── LogsTab — logs.tail with cursor-based live polling ─────────────
function LogsTab({client,isDemo}){
  const[lines,setLines]=useState([]);
  const[cursor,setCursor]=useState(null);
  const[filePath,setFilePath]=useState('');
  const[polling,setPolling]=useState(false);
  const[filterTxt,setFilterTxt]=useState('');
  const[levelFilter,setLevelFilter]=useState('');
  const logRef=useRef(null);
  const pollRef=useRef(null);
  const autoScroll=useRef(true);
  // Auto-start a single fetch on mount so logs aren't blank
  const didInit=useRef(false);

  const fetchTail=useCallback(async(cur)=>{
    if(isDemo){
      const parsed=MLOG_LINES.map(parseLogLine);
      setLines(parsed);setFilePath('~/.openclaw/openclaw.log');setCursor(999);return;
    }
    if(!client)return;
    try{
      const r=await client.req('logs.tail',{cursor:cur??undefined,limit:200,maxBytes:200000});
      if(r.lines?.length>0){
        const parsed=r.lines.map(parseLogLine);
        setLines(prev=>cur===null?parsed:[...prev,...parsed].slice(-2000));
        setCursor(r.cursor);setFilePath(r.file||'');
        if(autoScroll.current&&logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight;
      }else{setCursor(r.cursor);}
    }catch(e){
      if(!polling)setLines(prev=>[...prev,{time:'',level:'error',subsystem:'mc',message:'logs.tail error: '+e.message,raw:''}]);
    }
  },[client,isDemo]);

  const start=()=>{setPolling(true);fetchTail(null);};
  const stop=()=>{setPolling(false);if(pollRef.current)clearInterval(pollRef.current);};
  useEffect(()=>{
    if(polling){pollRef.current=setInterval(()=>fetchTail(cursor),3000);}
    return()=>{if(pollRef.current)clearInterval(pollRef.current);};
  },[polling,cursor,fetchTail]);
  // Auto-load on mount so logs aren't blank
  useEffect(()=>{if(!didInit.current){didInit.current=true;fetchTail(null);}},[fetchTail]);

  const shown=useMemo(()=>{
    let l=lines;
    if(levelFilter)l=l.filter(x=>x.level===levelFilter||x.level===levelFilter+'ing');
    if(filterTxt.trim()){const q=filterTxt.toLowerCase();l=l.filter(x=>x.message.toLowerCase().includes(q)||x.subsystem.toLowerCase().includes(q));}
    return l;
  },[lines,levelFilter,filterTxt]);

  const lvlCls=lv=>{const l=(lv||'').toLowerCase();if(l==='warn'||l==='warning')return'warn';if(l==='error'||l==='fatal')return'error';if(l==='debug'||l==='trace')return'debug';return'info';};

  return h(Fragment,null,
    h('div',{className:'log-wrap'},
      h('div',{className:'log-bar'},
        polling?h('button',{className:'btn btn-danger btn-sm',onClick:stop},'⏹ Stop'):h('button',{className:'btn btn-ok btn-sm',onClick:start},'▶ Live'),
        h('button',{className:'btn btn-sm',onClick:()=>fetchTail(null)},'Reload'),
        h('button',{className:'btn btn-sm',onClick:()=>{setLines([]);setCursor(null);}},  'Clear'),
        h('input',{style:{flex:1,minWidth:100,background:'var(--bg-4,var(--bg3))',border:'1px solid var(--bd)',borderRadius:4,padding:'4px 7px',color:'var(--tx)',fontFamily:'var(--mo)',fontSize:10,outline:'none'},value:filterTxt,onChange:e=>setFilterTxt(e.target.value),placeholder:'Filter…'}),
        h('select',{style:{background:'var(--bg3)',border:'1px solid var(--bd)',borderRadius:4,padding:'4px 6px',color:'var(--tx)',fontFamily:'var(--mo)',fontSize:10,outline:'none'},value:levelFilter,onChange:e=>setLevelFilter(e.target.value)},h('option',{value:''},'All levels'),['debug','info','warn','error'].map(v=>h('option',{key:v,value:v},v))),
        polling&&h('span',{className:'row',style:{gap:4}},h('span',{className:'spin'}),h('span',{style:{fontSize:9,color:'var(--t3)'}},'3s')),
        filePath&&h('span',{style:{fontSize:9,color:'var(--t3)',fontFamily:'var(--mo)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:160}},filePath)
      ),
      h('div',{ref:logRef,className:'log-out',onScroll:e=>{const el=e.target;autoScroll.current=el.scrollHeight-el.scrollTop-el.clientHeight<40;}},
        shown.length===0
          ?h('div',{style:{color:'var(--t3)',fontSize:10,padding:'4px 0'}},lines.length===0?'Click ▶ Live or Reload to load logs.':'No lines match filter.')
          :shown.map((ln,i)=>h('div',{key:i,className:`ll ${lvlCls(ln.level)}`},
            ln.time&&h('span',{className:'ts'},ln.time),
            ln.level&&h('span',{className:'lv'},(ln.level||'').toUpperCase().slice(0,4)),
            ln.subsystem&&h('span',{className:'sub'},ln.subsystem),
            ln.message
          ))
      )
    ),
    h('div',{style:{fontSize:9,color:'var(--t3)',fontFamily:'var(--mo)',marginTop:4}},
      `${lines.length} lines · cursor ${cursor??'none'} · ${shown.length} shown`
    )
  );
}

          })
        ),
        h('div',{style:{display:'flex',gap:2,marginBottom:6}},daily.map((d,i)=>h('div',{key:d.date,style:{flex:1,textAlign:'center',fontSize:8,color:'var(--t3)'}},i%3===0?d.date.slice(5):''))),
        h('div',{style:{maxHeight:200,overflowY:'auto'}},
          h('div',{className:'daily-row',style:{fontWeight:600}},h('div',{className:'d-date'},'Date'),h('div',{className:'d-cost'},'Cost'),h('div',{className:'d-tok'},'Tokens'),h('div',{style:{flex:1}})),
          daily.slice().reverse().map(d=>h('div',{key:d.date,className:'daily-row'},
            h('div',{className:'d-date'},d.date),
            h('div',{className:'d-cost'},fmtCost(d.totalCost)),
            h('div',{className:'d-tok'},fmtTok(d.totalTokens)),
            h('div',{style:{flex:1}},
              h('div',{style:{height:4,background:'var(--bd)',borderRadius:2,overflow:'hidden'}},
                h('div',{style:{height:'100%',borderRadius:2,background:'var(--bl2)',width:`${Math.round((d.totalCost/maxCost)*100)}%`}})
              )
            )
          ))
        )
      )
    ),
    provider&&h('div',{className:'card'},
      h('div',{className:'ch'},h('span',{className:'cht'},'Provider Usage'),h('span',{className:'pill pb',style:{fontSize:9}},'usage.status')),
      h('div',{className:'cb'},
        h('div',{className:'col',style:{gap:6}},
          (provider.providers||[]).map(p=>h('div',{key:p.id,style:{display:'flex',alignItems:'center',gap:10,padding:'6px 0',borderBottom:'1px solid var(--bd)'}},
            h('div',{style:{flex:1}},h('div',{style:{fontSize:11,fontWeight:600,fontFamily:'var(--sa)'}},p.label||p.id),h('div',{style:{fontSize:9,color:'var(--t3)',fontFamily:'var(--mo)',marginTop:2}},`Last used ${fmtT(p.lastUsedAt)}`)),
            h('div',{style:{textAlign:'right'}},h('div',{style:{fontSize:11,fontFamily:'var(--mo)'}},fmtCost(p.cost)),h('div',{style:{fontSize:9,color:'var(--t3)'}},`${p.requests||0} req · ${fmtTok(p.tokens)} tok`))
          ))
        )
      )
    )
  );
}


function UsageLogsWrapper({client,isDemo}){
  const[tab,setTab]=useState('cost');
  return h(Fragment,null,
    h('div',{className:'tr'},
      h('button',{className:`ta ${tab==='cost'?'on':''}`,onClick:()=>setTab('cost')},'💰 Cost & Usage'),
      h('button',{className:`ta ${tab==='logs'?'on':''}`,onClick:()=>setTab('logs')},'📄 Gateway Logs')
    ),
    tab==='cost'?h(UsageTab,{client,isDemo}):h(LogsTab,{client,isDemo})
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(h(App));

</script>

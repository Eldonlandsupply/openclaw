<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OpenClaw Mission Control</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;500;600;700;800&display=swap');
:root{--bg:#09090c;--bg2:#0e0f15;--bg3:#14161f;--bg4:#1a1d2a;--bg5:#1f2235;--bd:#232637;--b2:#2b2f44;--tx:#dde1f0;--t2:#8d96b2;--t3:#4a5070;--acc:#e84c3d;--a2:#ff6b5e;--gr:#27ae60;--gr2:#2ecc71;--yw:#e8a000;--bl:#2980b9;--bl2:#3498db;--pu:#8e44ad;--mo:'JetBrains Mono',monospace;--sa:'Syne',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--mo);font-size:13px;overflow:hidden}
.shell{display:grid;grid-template-columns:52px 228px 1fr;height:100vh}
/* RAIL */
.rail{background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:2px;z-index:20}
.rl{width:34px;height:34px;background:var(--acc);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--sa);font-weight:800;font-size:15px;color:#fff;margin-bottom:10px;cursor:pointer;transition:background .15s;flex-shrink:0}
.rl:hover{background:var(--a2)}
.rs{width:26px;height:1px;background:var(--bd);margin:6px 0}
.rb{width:36px;height:36px;border-radius:8px;border:none;background:transparent;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s}
.rb:hover{background:var(--bg3);color:var(--t2)}.rb.on{background:var(--bg4);color:var(--acc)}
.rsp{flex:1}
/* SIDEBAR */
.sb{background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.sbh{padding:14px 14px 10px;border-bottom:1px solid var(--bd);flex-shrink:0}
.sbht{font-family:var(--sa);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3)}
.sbhc{font-size:10px;color:var(--t3);margin-top:3px}
.sbs{padding:8px 10px;border-bottom:1px solid var(--bd);flex-shrink:0}
.sbs input{width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:5px;padding:5px 9px;color:var(--tx);font-family:var(--mo);font-size:11px;outline:none;transition:border-color .15s}
.sbs input:focus{border-color:var(--acc)}.sbs input::placeholder{color:var(--t3)}
.sbl{flex:1;overflow-y:auto;padding:6px 0}.sbl::-webkit-scrollbar{width:3px}.sbl::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.si{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;border-left:2px solid transparent;transition:background .1s,border-color .1s;min-width:0}
.si:hover{background:var(--bg3)}.si.on{background:var(--bg4);border-left-color:var(--acc)}
.sav{width:26px;height:26px;background:var(--bg4);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;border:1px solid var(--bd)}
.sn{font-family:var(--sa);font-size:11px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ss{font-size:9px;color:var(--t3);font-family:var(--mo);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.sd{width:5px;height:5px;border-radius:50%;background:var(--t3);flex-shrink:0}.sd.gr{background:var(--gr2)}.sd.ac{background:var(--acc)}.sd.yw{background:var(--yw)}
.sbadd{margin:6px 10px 10px;width:calc(100% - 20px);background:var(--bg3);border:1px dashed var(--b2);border-radius:7px;color:var(--t3);font-family:var(--mo);font-size:11px;padding:7px;cursor:pointer;transition:all .15s;text-align:center}
.sbadd:hover{border-color:var(--acc);color:var(--acc);background:var(--bg4)}
/* MAIN */
.mn{display:flex;flex-direction:column;overflow:hidden}
.tb{background:var(--bg2);border-bottom:1px solid var(--bd);padding:0 18px;height:46px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.tbt{font-family:var(--sa);font-size:14px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ct{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.ct::-webkit-scrollbar{width:5px}.ct::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
/* PILLS */
.pill{display:inline-flex;align-items:center;padding:1px 7px;border-radius:3px;font-size:9px;font-family:var(--mo);font-weight:500;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.po{background:rgba(39,174,96,.1);color:var(--gr2);border:1px solid rgba(39,174,96,.25)}
.pd{background:rgba(74,80,112,.12);color:var(--t3);border:1px solid var(--bd)}
.pde{background:rgba(232,76,61,.13);color:var(--acc);border:1px solid rgba(232,76,61,.28)}
.pw{background:rgba(232,160,0,.1);color:var(--yw);border:1px solid rgba(232,160,0,.25)}
.pb{background:rgba(41,128,185,.1);color:var(--bl2);border:1px solid rgba(41,128,185,.25)}
.pp{background:rgba(142,68,173,.1);color:#c39bd3;border:1px solid rgba(142,68,173,.25)}
/* TABS */
.tr{display:flex;gap:2px;background:var(--bg2);border:1px solid var(--bd);border-radius:7px;padding:2px;width:fit-content;flex-wrap:wrap}
.ta{padding:5px 12px;border-radius:5px;border:none;background:transparent;color:var(--t3);font-family:var(--mo);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.ta:hover{color:var(--t2);background:var(--bg3)}.ta.on{background:var(--bg4);color:var(--tx);border:1px solid var(--bd)}
/* CARDS */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:9px;overflow:hidden}
.ch{padding:12px 16px 9px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:10px}
.cht{font-family:var(--sa);font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t2)}
.cb{padding:14px 16px}
/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.g2,.g3{grid-template-columns:1fr}}
/* STAT */
.stat{background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:12px 14px}
.stl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:5px}
.stv{font-family:var(--sa);font-size:20px;font-weight:700;line-height:1}
.sts{font-size:10px;color:var(--t3);margin-top:4px}
.cgr{color:var(--gr2)}.cre{color:var(--acc)}.cyw{color:var(--yw)}.cbl{color:var(--bl2)}
/* KV */
.kv{display:grid;grid-template-columns:148px 1fr;gap:6px 12px;align-items:baseline}
.kl{font-size:10px;color:var(--t3)}.kv-v{font-size:11px;color:var(--tx);font-family:var(--mo);word-break:break-all}
/* FORM */
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em}
.field input,.field select,.field textarea{background:var(--bg3);border:1px solid var(--bd);border-radius:5px;padding:7px 9px;color:var(--tx);font-family:var(--mo);font-size:12px;outline:none;width:100%;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--acc)}
.field textarea{resize:vertical;min-height:80px;line-height:1.55}
.field select option{background:var(--bg3)}.field input::placeholder{color:var(--t3)}
/* BUTTONS */
.btn{padding:6px 13px;border-radius:5px;border:1px solid var(--bd);background:var(--bg3);color:var(--t2);font-family:var(--mo);font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.btn:hover:not(:disabled){background:var(--bg4);color:var(--tx);border-color:var(--b2)}.btn:disabled{opacity:.38;cursor:not-allowed}
.btp{background:var(--acc);color:#fff;border-color:var(--acc)}.btp:hover:not(:disabled){background:var(--a2);border-color:var(--a2)}
.btd{background:rgba(232,76,61,.08);color:var(--acc);border-color:rgba(232,76,61,.28)}.btd:hover:not(:disabled){background:rgba(232,76,61,.18)}
.bto{background:rgba(39,174,96,.08);color:var(--gr2);border-color:rgba(39,174,96,.28)}
.bts{padding:3px 9px;font-size:10px}
.br{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
/* FILE LIST */
.fl{display:flex;flex-direction:column;gap:1px}
.fr{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:5px;cursor:pointer;transition:background .1s}
.fr:hover{background:var(--bg3)}.fr.on{background:var(--bg4)}
.fn{font-size:11px;color:var(--tx);font-family:var(--mo);flex:1}.fm{font-size:9px;color:var(--t3)}
.ea{background:var(--bg3);border:1px solid var(--bd);border-radius:5px;padding:11px;color:var(--tx);font-family:var(--mo);font-size:11px;line-height:1.65;min-height:300px;outline:none;resize:vertical;width:100%}
.ea:focus{border-color:var(--acc)}
/* TOOLS */
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:7px;margin-top:8px}
.ti{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg3);border:1px solid var(--bd);border-radius:5px}
.tn{font-size:10px;font-family:var(--mo);color:var(--t2)}.td{font-size:9px;color:var(--t3);margin-top:1px}
.tog{width:30px;height:17px;background:var(--bd);border-radius:8px;position:relative;cursor:pointer;border:none;transition:background .2s;flex-shrink:0}
.tog.on{background:var(--acc)}.tog::after{content:'';position:absolute;top:2px;left:2px;width:13px;height:13px;background:#fff;border-radius:50%;transition:transform .2s}.tog.on::after{transform:translateX(13px)}
/* CRON */
.ci{background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:11px 13px;display:flex;align-items:flex-start;gap:11px}
.cnm{font-size:12px;color:var(--tx);font-weight:500;font-family:var(--sa)}
.csc{font-size:10px;color:var(--t3);font-family:var(--mo);margin-top:2px}
.cde{font-size:10px;color:var(--t2);margin-top:3px}
.cm{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;align-items:center}
.cst{display:grid;grid-template-columns:auto 1fr;gap:3px 9px;font-size:10px;margin-top:6px}
.cst .cl{color:var(--t3)}.cst .cv{color:var(--tx);font-family:var(--mo)}
/* SESSION */
.sesi{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;background:var(--bg3);border:1px solid var(--bd);border-radius:6px;cursor:pointer;transition:border-color .15s}
.sesi:hover{border-color:var(--b2)}.sesi.on{border-color:var(--acc)}
.sesk{font-size:10px;color:var(--t2);font-family:var(--mo);flex:1;word-break:break-all}
.sesm{font-size:9px;color:var(--t3);margin-top:3px}
.preview-item{padding:6px 10px;border-radius:4px;font-size:11px;line-height:1.5;margin-top:4px}
.preview-item.user{background:rgba(41,128,185,.08);border-left:2px solid var(--bl2);color:var(--t2)}
.preview-item.assistant{background:rgba(39,174,96,.06);border-left:2px solid var(--gr2);color:var(--t2)}
/* SKILLS */
.ski{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;background:var(--bg3);border:1px solid var(--bd);border-radius:6px}
.skn{font-size:12px;color:var(--tx);font-weight:500;font-family:var(--sa)}
.skd{font-size:10px;color:var(--t2);margin-top:2px}
.skm{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
/* EXEC APPROVALS */
.eal{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border:1px solid var(--bd);border-radius:5px}
.eap{font-size:11px;font-family:var(--mo);color:var(--tx);flex:1;word-break:break-all}
.eam{font-size:9px;color:var(--t3)}
/* AUDIT */
.ai{display:flex;gap:10px;padding:7px 10px;border-radius:4px;font-size:11px;color:var(--t2);border-left:2px solid transparent}
.ai:hover{background:var(--bg3)}
.ai.create{border-left-color:var(--gr2)}.ai.update{border-left-color:var(--bl2)}.ai.delete{border-left-color:var(--acc)}.ai.event{border-left-color:var(--yw)}
.ats{color:var(--t3);font-family:var(--mo);flex-shrink:0;font-size:10px;min-width:55px}
.ame{font-family:var(--mo);font-weight:500;color:var(--tx);font-size:10px}
/* HEALTH */
.hbar{height:4px;border-radius:2px;background:var(--bd);overflow:hidden;margin-top:5px}
.hfil{height:100%;border-radius:2px;transition:width .5s}.hfil.gr{background:var(--gr2)}.hfil.yw{background:var(--yw)}.hfil.re{background:var(--acc)}
/* CALLOUTS */
.callout{padding:9px 13px;border-radius:5px;font-size:11px;line-height:1.55}
.ci{background:rgba(41,128,185,.08);border:1px solid rgba(41,128,185,.22);color:#7ec8f5}
/* Redefine ci since it collides */
.callout.info{background:rgba(41,128,185,.08);border:1px solid rgba(41,128,185,.22);color:#7ec8f5}
.callout.warn{background:rgba(232,160,0,.08);border:1px solid rgba(232,160,0,.22);color:var(--yw)}
.callout.err{background:rgba(232,76,61,.08);border:1px solid rgba(232,76,61,.22);color:var(--acc)}
.callout.ok{background:rgba(39,174,96,.08);border:1px solid rgba(39,174,96,.22);color:var(--gr2)}
/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:200}
.mo{background:var(--bg2);border:1px solid var(--bd);border-radius:11px;padding:22px;width:520px;max-width:92vw;max-height:84vh;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.mo h2{font-family:var(--sa);font-size:15px;font-weight:700}.mo-sub{font-size:11px;color:var(--t3);margin-top:-8px}
/* CONNECT */
.cop{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:22px;padding:40px;background:var(--bg)}
.colo{font-family:var(--sa);font-size:30px;font-weight:800;color:var(--acc);letter-spacing:-.02em}
.cosu{font-size:12px;color:var(--t3);text-align:center;max-width:340px;line-height:1.65}
.cofo{background:var(--bg2);border:1px solid var(--bd);border-radius:11px;padding:22px;width:100%;max-width:390px;display:flex;flex-direction:column;gap:14px}
.cofo h3{font-family:var(--sa);font-size:13px;font-weight:700}
/* STATUS */
.srow{display:flex;align-items:center;gap:6px}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sdot.gr{background:var(--gr2)}.sdot.re{background:var(--acc)}.sdot.yw{background:var(--yw);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.spin{display:inline-block;width:12px;height:12px;border:2px solid var(--bd);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
/* CONN BANNER */
.cbanner{position:fixed;bottom:14px;right:14px;background:var(--bg2);border:1px solid var(--bd);border-radius:9px;padding:11px 14px;display:flex;align-items:center;gap:9px;z-index:100;min-width:260px;box-shadow:0 8px 28px rgba(0,0,0,.5)}
.cbtx{flex:1;font-size:11px;color:var(--t2)}.cbcl{background:none;border:none;color:var(--t3);cursor:pointer;font-size:13px;padding:0 2px}
/* EMPTY */
.emp{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;color:var(--t3);text-align:center;gap:7px}
.empi{font-size:28px;margin-bottom:3px}.empt{font-family:var(--sa);font-size:13px;font-weight:600;color:var(--t2)}.emps{font-size:11px}
/* TOPOLOGY */
.ton{display:inline-flex;align-items:center;gap:7px;padding:7px 12px;background:var(--bg3);border:1px solid var(--bd);border-radius:7px;font-size:11px;color:var(--t2);cursor:pointer;transition:all .15s}
.ton:hover,.ton.on{border-color:var(--acc);color:var(--tx)}
.sep{height:1px;background:var(--bd);margin:10px 0}
.muted{color:var(--t3)}.mono{font-family:var(--mo)}.row{display:flex;gap:7px;align-items:center}.col{display:flex;flex-direction:column;gap:8px}.f1{flex:1}
/* DIFF */
.diff-b{background:rgba(232,76,61,.04);border:1px solid rgba(232,76,61,.15);border-radius:5px;padding:10px;font-size:10px;font-family:var(--mo);color:var(--t2);white-space:pre-wrap;max-height:160px;overflow-y:auto}
.diff-a{background:rgba(39,174,96,.04);border:1px solid rgba(39,174,96,.15);border-radius:5px;padding:10px;font-size:10px;font-family:var(--mo);color:var(--t2);white-space:pre-wrap;max-height:160px;overflow-y:auto}
.config-raw{background:var(--bg3);border:1px solid var(--bd);border-radius:5px;padding:12px;font-size:10px;font-family:var(--mo);color:var(--t2);white-space:pre-wrap;max-height:300px;overflow-y:auto;line-height:1.6}

/* ── Phase 4 additions ── */
.rl-item{display:flex;align-items:center;gap:8px;padding:6px 9px;background:var(--bg3);border:1px solid var(--bd);border-radius:5px}
.rl-ts{font-size:9px;color:var(--t3);font-family:var(--mo);flex-shrink:0;min-width:80px}
.rl-dur{font-size:9px;font-family:var(--mo);color:var(--t2);flex-shrink:0;min-width:45px;text-align:right}
.rl-summary{font-size:10px;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rl-err{font-size:9px;color:var(--acc);margin-top:1px}
.bar-wrap{height:4px;background:var(--bd);border-radius:2px;overflow:hidden;margin-top:3px}
.bar-fill{height:100%;border-radius:2px;transition:width .3s}
.node-card{background:var(--bg3);border:1px solid var(--bd);border-radius:6px;padding:9px 11px;display:flex;align-items:flex-start;gap:9px;cursor:pointer;transition:border-color .12s}
.node-card:hover{border-color:var(--b2)}.node-card.on{border-color:var(--acc)}
.node-icon{width:30px;height:30px;background:var(--bg4);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.cap{font-size:8px;font-family:var(--mo);background:var(--bg4);color:var(--t2);border:1px solid var(--bd);border-radius:2px;padding:1px 4px}
.log-wrap{background:var(--bg3);border:1px solid var(--bd);border-radius:5px;overflow:hidden}
.log-bar{padding:7px 9px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.log-out{height:340px;overflow-y:auto;padding:7px 9px;font-family:var(--mo);font-size:10px;line-height:1.5}
.log-out::-webkit-scrollbar{width:3px}.log-out::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.ll{margin-bottom:1px;white-space:pre-wrap;word-break:break-all}
.ll.info{color:var(--t2)}.ll.warn{color:var(--yw2)}.ll.error,.ll.fatal{color:var(--acc)}.ll.debug,.ll.trace{color:var(--t3)}
.ll .ts{color:var(--t3);margin-right:5px}.ll .lv{margin-right:5px;font-weight:600}.ll .sub{color:var(--pu2);margin-right:5px}
.daily-row{display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:1px solid var(--bd)}
.d-date{font-size:9px;color:var(--t3);font-family:var(--mo);width:78px;flex-shrink:0}
.d-cost{font-size:10px;font-family:var(--mo);width:65px;text-align:right;flex-shrink:0}
.d-tok{font-size:9px;color:var(--t3);width:70px;text-align:right;flex-shrink:0}
</style>
</head>
<body><div id="root"></div>
<script>
// ═══════════════════════════════════════════════════════════════
//  OPENCLAW MISSION CONTROL — PHASE 3
//  Phase 3 additions:
//  - config.patch: correct RFC7396 merge-patch strategy (full list replace)
//  - sessions.preview: transcript inline preview
//  - exec.approvals.get/set: per-agent allowlist editor
//  - skills.status/update/install: skills management panel

// ── GATEWAY CLIENT ──────────────────────────────────────────────
class GW {
  constructor(url,tok){this.url=url;this.tok=tok;this.ws=null;this.pend=new Map();this._id=0;this.evts=new Map();this.ok=false;}
  on(ev,fn){if(!this.evts.has(ev))this.evts.set(ev,new Set());this.evts.get(ev).add(fn);return()=>this.evts.get(ev)?.delete(fn);}
  emit(ev,d){this.evts.get(ev)?.forEach(fn=>fn(d));}
  connect(){
    return new Promise((res,rej)=>{
      try{this.ws=new WebSocket(this.url);}catch(e){rej(new Error('Invalid URL'));return;}
      const t=setTimeout(()=>{this.ws?.close();rej(new Error('Timeout (8s)'));},8000);
      this.ws.onopen=()=>{
        clearTimeout(t);
        this.ws.send(JSON.stringify({type:'req',id:String(++this._id),method:'connect',params:{
          minProtocol:3,maxProtocol:3,
          client:{id:'openclaw-control-ui',displayName:'Mission Control',version:'3.0.0',platform:'browser',mode:'ui'},
          role:'operator',
          scopes:['operator.admin','operator.approvals','operator.pairing'],
          ...(this.tok?{auth:{token:this.tok}}:{})
        }}));
        this.ok=true;res(this);this.emit('connect',{});
      };
      this.ws.onmessage=(e)=>{
        try{
          const m=JSON.parse(e.data);
          if(m.type==='res'&&m.id){const p=this.pend.get(m.id);if(p){this.pend.delete(m.id);m.ok?p.res(m.payload):p.rej(new Error(m.error?.message||'Request failed'));}}
          else if(m.type==='event')this.emit('event',m);
        }catch{}
      };
      this.ws.onerror=(e)=>{clearTimeout(t);this.emit('error',e);rej(new Error('WebSocket error'));};
      this.ws.onclose=(e)=>{this.ok=false;this.pend.forEach(p=>p.rej(new Error('Disconnected')));this.pend.clear();this.emit('disconnect',{code:e.code,reason:e.reason});};
    });
  }
  req(method,params={}){
    return new Promise((res,rej)=>{
      if(!this.ws||this.ws.readyState!==WebSocket.OPEN){rej(new Error('Not connected'));return;}
      const id=String(++this._id);this.pend.set(id,{res,rej});
      this.ws.send(JSON.stringify({type:'req',id,method,params}));
      setTimeout(()=>{if(this.pend.has(id)){this.pend.delete(id);rej(new Error('Timeout'));}},18000);
    });
  }
  disconnect(){this.ws?.close();this.ws=null;this.ok=false;}
}

// ── CONFIG PATCH — correct RFC7396 strategy ───────────────────
// The config uses applyMergePatch (RFC7396). Arrays are REPLACED, never merged.
// To patch agents.list[id=X].tools, we must:
//   1. Parse configRaw to get the full agents.list array
//   2. Find+update the specific entry
//   3. Send the entire agents object in the patch
//
// This function takes the raw config JSON, an agentId, and a partial AgentConfig,
// and returns a safe patch object that only touches that agent.
function buildAgentPatch(configRaw, agentId, agentUpdate) {
  let parsed = {};
  try { parsed = JSON.parse(configRaw || '{}'); } catch { try { parsed = eval('(' + (configRaw||'{}') + ')'); } catch {} }
  const currentList = Array.isArray(parsed?.agents?.list) ? parsed.agents.list : [];
  const idx = currentList.findIndex(e => e?.id === agentId || e?.id?.toLowerCase() === agentId.toLowerCase());
  const updatedList = [...currentList];
  if (idx >= 0) {
    updatedList[idx] = { ...updatedList[idx], ...agentUpdate };
  } else {
    updatedList.push({ id: agentId, ...agentUpdate });
  }
  // Return the minimal patch: only touch agents.list
  return { agents: { ...(parsed.agents || {}), list: updatedList } };
}
// ── TOOL POLICY (uses safe merge-patch strategy) ─────────────────
function ToolPolicyPanel({agentId,configRaw,configHash,configLoading,client,isDemo,onConfigRefresh}){
  const[toolsEnabled,setToolsEnabled]=useState(()=>{const m={};MTOOLS.forEach(t=>{m[t.id]=!['exec','browser'].includes(t.id)});return m;});
  const[saving,setSaving]=useState(false);
  const[msg,setMsg]=useState('');
  const[showDiff,setShowDiff]=useState(false);
  const grps=useMemo(()=>{const g={};MTOOLS.forEach(t=>{if(!g[t.group])g[t.group]=[];g[t.group].push(t)});return g;},[]);
  const enabled=Object.values(toolsEnabled).filter(Boolean).length;

  // Build what the patch will look like before sending
  const previewPatch=useMemo(()=>{
    const deny=MTOOLS.filter(t=>!toolsEnabled[t.id]).map(t=>t.id);
    const alsoAllow=MTOOLS.filter(t=>toolsEnabled[t.id]&&['exec','browser'].includes(t.id)).map(t=>t.id);
    return {tools:{deny,alsoAllow}};
  },[toolsEnabled]);

  const save=async()=>{
    setSaving(true);setMsg('');
    const deny=MTOOLS.filter(t=>!toolsEnabled[t.id]).map(t=>t.id);
    const alsoAllow=MTOOLS.filter(t=>toolsEnabled[t.id]&&['exec','browser'].includes(t.id)).map(t=>t.id);
    try{
      if(!isDemo&&client&&configHash){
        // CRITICAL: use buildAgentPatch to avoid replacing the whole agents.list array
        const agentUpdate={tools:{deny:deny.length?deny:undefined,alsoAllow:alsoAllow.length?alsoAllow:undefined}};
        const fullPatch=buildAgentPatch(configRaw,agentId,agentUpdate);
        await client.req('config.patch',{raw:JSON.stringify(fullPatch),baseHash:configHash,note:`MC: tool policy ${agentId}`});
        pushA('update','config.patch',`${agentId} tools deny:[${deny.slice(0,3).join(',')}${deny.length>3?'…':''}]`);

      } else {
        pushA('update','config.patch',`${agentId} tools (demo)`);

      setMsg('Tool policy written via config.patch ✓');setShowDiff(false);
    }catch(e){setMsg('Error: '+e.message);}
    setSaving(false);
  };

  return h('div',{className:'card'},
    h('div',{className:'ch'},h('span',{className:'cht'},'Tool Access Policy'),
      h('div',{className:'row',style:{gap:6}},

        h('button',{className:'btn bts',onClick:()=>{const a={};MTOOLS.forEach(t=>a[t.id]=false);setToolsEnabled(a);}},'All Off')
      )

    h('div',{className:'cb'},
      msg&&h('div',{className:`callout ${msg.startsWith('Error')?'err':'ok'}`,style:{marginBottom:10}},msg),
      showDiff&&h('div',{style:{marginBottom:12}},
        h('div',{style:{fontSize:10,color:'var(--t3)',marginBottom:6}},'Patch preview — what will be written via config.patch (RFC7396, full agents.list replace):'),
        h('div',{className:'config-raw'},jsonFmt(buildAgentPatch(configRaw||'{}',agentId,previewPatch)))
      ),
      !showDiff&&h('div',{className:'callout info',style:{marginBottom:12,fontSize:10}},

  const[lines,setLines]=useState([]);

  const[polling,setPolling]=useState(false);
  const[filterTxt,setFilterTxt]=useState('');

  const logRef=useRef(null);
  const pollRef=useRef(null);
  const autoScroll=useRef(true);

  const fetchTail=useCallback(async(cur)=>{
    if(isDemo){
      const parsed=MLOG_LINES.map(parseLogLine);
      setLines(parsed);setFilePath('~/.openclaw/openclaw.log');setCursor(999);return;
    }

    try{
      const r=await client.req('logs.tail',{cursor:cur??undefined,limit:200,maxBytes:200000});
      if(r.lines?.length>0){
        const parsed=r.lines.map(parseLogLine);

        setCursor(r.cursor);setFilePath(r.file||'');

      }else{setCursor(r.cursor);}

  const stop=()=>{setPolling(false);if(pollRef.current)clearInterval(pollRef.current);};

    if(polling){pollRef.current=setInterval(()=>fetchTail(cursor),3000);}

        h('button',{className:'btn btn-sm',onClick:()=>fetchTail(null)},'Reload'),

        h('input',{style:{flex:1,minWidth:100,background:'var(--bg-4,var(--bg3))',border:'1px solid var(--bd)',borderRadius:4,padding:'4px 7px',color:'var(--tx)',fontFamily:'var(--mo)',fontSize:10,outline:'none'},value:filterTxt,onChange:e=>setFilterTxt(e.target.value),placeholder:'Filter…'}),
        h('select',{style:{background:'var(--bg3)',border:'1px solid var(--bd)',borderRadius:4,padding:'4px 6px',color:'var(--tx)',fontFamily:'var(--mo)',fontSize:10,outline:'none'},value:levelFilter,onChange:e=>setLevelFilter(e.target.value)},h('option',{value:''},'All levels'),['debug','info','warn','error'].map(v=>h('option',{key:v,value:v},v))),
        polling&&h('span',{className:'row',style:{gap:4}},h('span',{className:'spin'}),h('span',{style:{fontSize:9,color:'var(--t3)'}},'3s')),
        filePath&&h('span',{style:{fontSize:9,color:'var(--t3)',fontFamily:'var(--mo)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:160}},filePath)
      ),
      h('div',{ref:logRef,className:'log-out',onScroll:e=>{const el=e.target;autoScroll.current=el.scrollHeight-el.scrollTop-el.clientHeight<40;}},
        shown.length===0

          :shown.map((ln,i)=>h('div',{key:i,className:`ll ${lvlCls(ln.level)}`},
            ln.time&&h('span',{className:'ts'},ln.time),

            ln.subsystem&&h('span',{className:'sub'},ln.subsystem),
            ln.message
          ))
      )
    ),
    h('div',{style:{fontSize:9,color:'var(--t3)',fontFamily:'var(--mo)',marginTop:4}},
      `${lines.length} lines · cursor ${cursor??'none'} · ${shown.length} shown`

        h('div',{style:{display:'flex',alignItems:'flex-end',gap:2,height:56,marginBottom:6}},
          daily.map((d,i)=>{
            const pct=Math.round(Math.max((d.totalCost/maxCost)*100,2));
            const col=pct>70?'var(--acc)':pct>40?'var(--yw2)':'var(--bl2)';
            return h('div',{key:d.date,style:{flex:1,height:`${pct}%`,background:col,borderRadius:'1px 1px 0 0',opacity:.85},title:`${d.date}: ${fmtCost(d.totalCost)}`});
          })
        ),
        h('div',{style:{display:'flex',gap:2,marginBottom:6}},daily.map((d,i)=>h('div',{key:d.date,style:{flex:1,textAlign:'center',fontSize:8,color:'var(--t3)'}},i%3===0?d.date.slice(5):''))),
        h('div',{style:{maxHeight:200,overflowY:'auto'}},
          h('div',{className:'daily-row',style:{fontWeight:600}},h('div',{className:'d-date'},'Date'),h('div',{className:'d-cost'},'Cost'),h('div',{className:'d-tok'},'Tokens'),h('div',{style:{flex:1}})),
          daily.slice().reverse().map(d=>h('div',{key:d.date,className:'daily-row'},
            h('div',{className:'d-date'},d.date),
            h('div',{className:'d-cost'},fmtCost(d.totalCost)),
            h('div',{className:'d-tok'},fmtTok(d.totalTokens)),
            h('div',{style:{flex:1}},
              h('div',{style:{height:4,background:'var(--bd)',borderRadius:2,overflow:'hidden'}},
                h('div',{style:{height:'100%',borderRadius:2,background:'var(--bl2)',width:`${Math.round((d.totalCost/maxCost)*100)}%`}})
              )
            )
          ))
        )
      )
    ),
    provider&&h('div',{className:'card'},
      h('div',{className:'ch'},h('span',{className:'cht'},'Provider Usage'),h('span',{className:'pill pb',style:{fontSize:9}},'usage.status')),
      h('div',{className:'cb'},
        h('div',{className:'col',style:{gap:6}},
          (provider.providers||[]).map(p=>h('div',{key:p.id,style:{display:'flex',alignItems:'center',gap:10,padding:'6px 0',borderBottom:'1px solid var(--bd)'}},
            h('div',{style:{flex:1}},h('div',{style:{fontSize:11,fontWeight:600,fontFamily:'var(--sa)'}},p.label||p.id),h('div',{style:{fontSize:9,color:'var(--t3)',fontFamily:'var(--mo)',marginTop:2}},`Last used ${fmtT(p.lastUsedAt)}`)),
            h('div',{style:{textAlign:'right'}},h('div',{style:{fontSize:11,fontFamily:'var(--mo)'}},fmtCost(p.cost)),h('div',{style:{fontSize:9,color:'var(--t3)'}},`${p.requests||0} req · ${fmtTok(p.tokens)} tok`))
          ))
        )
      )
    )
  );
}


function UsageLogsWrapper({client,isDemo}){
  const[tab,setTab]=useState('cost');
  return h(Fragment,null,
    h('div',{className:'tr'},
      h('button',{className:`ta ${tab==='cost'?'on':''}`,onClick:()=>setTab('cost')},'💰 Cost & Usage'),
      h('button',{className:`ta ${tab==='logs'?'on':''}`,onClick:()=>setTab('logs')},'📄 Gateway Logs')
    ),
    tab==='cost'?h(UsageTab,{client,isDemo}):h(LogsTab,{client,isDemo})
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Mission Control</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;500;600;700;800&display=swap');

:root {
  --bg:     #09090c;
  --bg-2:   #0e0f15;
  --bg-3:   #14161f;
  --bg-4:   #1a1d2a;
  --bg-5:   #1f2235;
  --border: #232637;
  --b2:     #2b2f44;
  --text:   #dde1f0;
  --t2:     #8d96b2;
  --t3:     #4a5070;
  --acc:    #e84c3d;
  --acc2:   #ff6b5e;
  --green:  #27ae60;
  --green2: #2ecc71;
  --yellow: #e8a000;
  --blue:   #2980b9;
  --blue2:  #3498db;
  --purple: #8e44ad;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Syne', sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;overflow:hidden}

/* ── SHELL ── */
.shell{display:grid;grid-template-columns:52px 228px 1fr;height:100vh}

/* ── RAIL ── */
.rail{background:var(--bg-2);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:2px;z-index:20}
.rail-logo{width:34px;height:34px;background:var(--acc);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--sans);font-weight:800;font-size:15px;color:#fff;margin-bottom:10px;cursor:pointer;transition:background .15s}
.rail-logo:hover{background:var(--acc2)}
.rail-sep{width:26px;height:1px;background:var(--border);margin:6px 0}
.rail-btn{width:36px;height:36px;border-radius:8px;border:none;background:transparent;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;position:relative}
.rail-btn:hover{background:var(--bg-3);color:var(--t2)}
.rail-btn.active{background:var(--bg-4);color:var(--acc)}
.rail-btn .rb-badge{position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--acc);border-radius:50%;border:1.5px solid var(--bg-2)}
.rail-spacer{flex:1}
.rail-tip{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-top:2px}

/* ── SIDEBAR ── */
.sidebar{background:var(--bg-2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;min-width:0}
.sb-head{padding:14px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-head-title{font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3)}
.sb-head-count{font-size:10px;color:var(--t3);margin-top:3px}
.sb-search{padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-search input{width:100%;background:var(--bg-3);border:1px solid var(--border);border-radius:5px;padding:5px 9px;color:var(--text);font-family:var(--mono);font-size:11px;outline:none;transition:border-color .15s}
.sb-search input:focus{border-color:var(--acc)}
.sb-search input::placeholder{color:var(--t3)}
.sb-list{flex:1;overflow-y:auto;padding:6px 0}
.sb-list::-webkit-scrollbar{width:3px}
.sb-list::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.sb-add{margin:6px 10px 10px;width:calc(100% - 20px);background:var(--bg-3);border:1px dashed var(--b2);border-radius:7px;color:var(--t3);font-family:var(--mono);font-size:11px;padding:7px;cursor:pointer;transition:all .15s;text-align:center}
.sb-add:hover{border-color:var(--acc);color:var(--acc);background:var(--bg-4)}

/* sidebar items */
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;border-left:2px solid transparent;transition:background .1s,border-color .1s;min-width:0}
.sb-item:hover{background:var(--bg-3)}
.sb-item.active{background:var(--bg-4);border-left-color:var(--acc)}
.sb-avatar{width:26px;height:26px;background:var(--bg-4);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;border:1px solid var(--border)}
.sb-info{flex:1;min-width:0}
.sb-name{font-family:var(--sans);font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-sub{font-size:9px;color:var(--t3);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.sb-dot{width:5px;height:5px;border-radius:50%;background:var(--t3);flex-shrink:0}
.sb-dot.on{background:var(--green2)}
.sb-dot.acc{background:var(--acc)}
.sb-dot.yellow{background:var(--yellow)}

/* ── MAIN ── */
.main{display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--bg-2);border-bottom:1px solid var(--border);padding:0 18px;height:46px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar-title{font-family:var(--sans);font-size:14px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-sub{font-size:10px;color:var(--t3);font-family:var(--mono);flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}

/* ── PILLS ── */
.pill{display:inline-flex;align-items:center;padding:1px 7px;border-radius:3px;font-size:9px;font-family:var(--mono);font-weight:500;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.p-default{background:rgba(232,76,61,.13);color:var(--acc);border:1px solid rgba(232,76,61,.28)}
.p-ok{background:rgba(39,174,96,.1);color:var(--green2);border:1px solid rgba(39,174,96,.25)}
.p-off{background:rgba(74,80,112,.12);color:var(--t3);border:1px solid var(--border)}
.p-warn{background:rgba(232,160,0,.1);color:var(--yellow);border:1px solid rgba(232,160,0,.25)}
.p-blue{background:rgba(41,128,185,.1);color:var(--blue2);border:1px solid rgba(41,128,185,.25)}

/* ── TABS ── */
.tab-row{display:flex;gap:2px;background:var(--bg-2);border:1px solid var(--border);border-radius:7px;padding:2px;width:fit-content;flex-shrink:0;flex-wrap:wrap}
.tab{padding:5px 12px;border-radius:5px;border:none;background:transparent;color:var(--t3);font-family:var(--mono);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--t2);background:var(--bg-3)}
.tab.active{background:var(--bg-4);color:var(--text);border:1px solid var(--border)}

/* ── CARDS ── */
.card{background:var(--bg-2);border:1px solid var(--border);border-radius:9px;overflow:hidden}
.ch{padding:12px 16px 9px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.ct{font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t2)}
.cb{padding:14px 16px}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.g2,.g3{grid-template-columns:1fr}}

/* ── STAT CARDS ── */
.stat{background:var(--bg-3);border:1px solid var(--border);border-radius:7px;padding:12px 14px}
.stat-l{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:5px}
.stat-v{font-family:var(--sans);font-size:20px;font-weight:700;line-height:1}
.stat-s{font-size:10px;color:var(--t3);margin-top:4px}
.c-green{color:var(--green2)}
.c-red{color:var(--acc)}
.c-yellow{color:var(--yellow)}
.c-blue{color:var(--blue2)}

/* ── KV ── */
.kv{display:grid;grid-template-columns:140px 1fr;gap:6px 12px;align-items:baseline}
.kl{font-size:10px;color:var(--t3)}
.kv-v{font-size:11px;color:var(--text);font-family:var(--mono);word-break:break-all}

/* ── FORMS ── */
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em}
.field input,.field select,.field textarea{background:var(--bg-3);border:1px solid var(--border);border-radius:5px;padding:7px 9px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;width:100%;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--acc)}
.field textarea{resize:vertical;min-height:80px;line-height:1.55}
.field select option{background:var(--bg-3)}
.field input::placeholder{color:var(--t3)}

/* ── BUTTONS ── */
.btn{padding:6px 13px;border-radius:5px;border:1px solid var(--border);background:var(--bg-3);color:var(--t2);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.btn:hover:not(:disabled){background:var(--bg-4);color:var(--text);border-color:var(--b2)}
.btn:disabled{opacity:.38;cursor:not-allowed}
.btn-prim{background:var(--acc);color:#fff;border-color:var(--acc)}
.btn-prim:hover:not(:disabled){background:var(--acc2);border-color:var(--acc2)}
.btn-danger{background:rgba(232,76,61,.08);color:var(--acc);border-color:rgba(232,76,61,.28)}
.btn-danger:hover:not(:disabled){background:rgba(232,76,61,.18)}
.btn-ok{background:rgba(39,174,96,.08);color:var(--green2);border-color:rgba(39,174,96,.28)}
.btn-sm{padding:3px 9px;font-size:10px}
.btn-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}

/* ── FILE BROWSER ── */
.fl{display:flex;flex-direction:column;gap:1px}
.fr{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:5px;cursor:pointer;transition:background .1s}
.fr:hover{background:var(--bg-3)}
.fr.active{background:var(--bg-4)}
.fn{font-size:11px;color:var(--text);font-family:var(--mono);flex:1}
.fm{font-size:9px;color:var(--t3)}
.editor-wrap{display:flex;flex-direction:column;gap:7px}
.editor-toolbar{display:flex;justify-content:space-between;align-items:center}
.editor-path{font-size:9px;color:var(--t3);font-family:var(--mono)}
.editor-area{background:var(--bg-3);border:1px solid var(--border);border-radius:5px;padding:11px;color:var(--text);font-family:var(--mono);font-size:11px;line-height:1.65;min-height:300px;outline:none;resize:vertical;width:100%}
.editor-area:focus{border-color:var(--acc)}

/* ── TOOL GRID ── */
.tool-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:7px;margin-top:8px}
.tool-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg-3);border:1px solid var(--border);border-radius:5px}
.tool-name{font-size:10px;font-family:var(--mono);color:var(--t2)}
.tool-desc{font-size:9px;color:var(--t3);margin-top:1px}
.toggle{width:30px;height:17px;background:var(--border);border-radius:8px;position:relative;cursor:pointer;border:none;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--acc)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:13px;height:13px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle.on::after{transform:translateX(13px)}

/* ── CRON ── */
.cron-item{background:var(--bg-3);border:1px solid var(--border);border-radius:7px;padding:11px 13px;display:flex;align-items:flex-start;gap:11px}
.cron-info{flex:1;min-width:0}
.cron-name{font-size:12px;color:var(--text);font-weight:500;font-family:var(--sans)}
.cron-sched{font-size:10px;color:var(--t3);font-family:var(--mono);margin-top:2px}
.cron-desc{font-size:10px;color:var(--t2);margin-top:3px}
.cron-meta{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;align-items:center}
.cron-state{display:grid;grid-template-columns:auto 1fr;gap:4px 10px;font-size:10px;margin-top:6px}
.cron-state .sl{color:var(--t3)}
.cron-state .sv{color:var(--text);font-family:var(--mono)}

/* ── SESSIONS ── */
.session-item{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;background:var(--bg-3);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:border-color .15s}
.session-item:hover{border-color:var(--b2)}
.session-item.active{border-color:var(--acc)}
.session-key{font-size:10px;color:var(--t2);font-family:var(--mono);flex:1;word-break:break-all}
.session-meta{font-size:9px;color:var(--t3);margin-top:3px}

/* ── AUDIT LOG ── */
.audit-item{display:flex;gap:10px;padding:7px 10px;border-radius:4px;font-size:11px;color:var(--t2);border-left:2px solid transparent}
.audit-item:hover{background:var(--bg-3)}
.audit-item.create{border-left-color:var(--green2)}
.audit-item.update{border-left-color:var(--blue2)}
.audit-item.delete{border-left-color:var(--acc)}
.audit-item.event{border-left-color:var(--yellow)}
.audit-ts{color:var(--t3);font-family:var(--mono);flex-shrink:0;font-size:10px;min-width:55px}
.audit-method{font-family:var(--mono);font-weight:500;color:var(--text);font-size:10px}

/* ── HEALTH ── */
.health-bar{height:4px;border-radius:2px;background:var(--border);overflow:hidden;margin-top:5px}
.health-fill{height:100%;border-radius:2px;transition:width .5s}
.health-fill.green{background:var(--green2)}
.health-fill.yellow{background:var(--yellow)}
.health-fill.red{background:var(--acc)}

/* ── CALLOUTS ── */
.callout{padding:9px 13px;border-radius:5px;font-size:11px;line-height:1.55}
.c-info{background:rgba(41,128,185,.08);border:1px solid rgba(41,128,185,.22);color:#7ec8f5}
.c-warn{background:rgba(232,160,0,.08);border:1px solid rgba(232,160,0,.22);color:var(--yellow)}
.c-err{background:rgba(232,76,61,.08);border:1px solid rgba(232,76,61,.22);color:var(--acc)}
.c-ok{background:rgba(39,174,96,.08);border:1px solid rgba(39,174,96,.22);color:var(--green2)}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--bg-2);border:1px solid var(--border);border-radius:11px;padding:22px;width:500px;max-width:92vw;max-height:82vh;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.modal h2{font-family:var(--sans);font-size:15px;font-weight:700}
.modal-sub{font-size:11px;color:var(--t3);margin-top:-8px}

/* ── CONNECT ── */
.connect-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:22px;padding:40px;background:var(--bg)}
.connect-logo{font-family:var(--sans);font-size:30px;font-weight:800;color:var(--acc);letter-spacing:-.02em}
.connect-sub{font-size:12px;color:var(--t3);text-align:center;max-width:340px;line-height:1.65}
.connect-form{background:var(--bg-2);border:1px solid var(--border);border-radius:11px;padding:22px;width:100%;max-width:390px;display:flex;flex-direction:column;gap:14px}
.connect-form h3{font-family:var(--sans);font-size:13px;font-weight:700}

/* ── STATUS ── */
.status-row{display:flex;align-items:center;gap:6px}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sdot.green{background:var(--green2)}
.sdot.red{background:var(--acc)}
.sdot.yellow{background:var(--yellow);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── CONN BANNER ── */
.conn-banner{position:fixed;bottom:14px;right:14px;background:var(--bg-2);border:1px solid var(--border);border-radius:9px;padding:11px 14px;display:flex;align-items:center;gap:9px;z-index:100;min-width:260px;box-shadow:0 8px 28px rgba(0,0,0,.5)}
.conn-text{flex:1;font-size:11px;color:var(--t2)}
.conn-close{background:none;border:none;color:var(--t3);cursor:pointer;font-size:13px;padding:0 2px}

/* ── TOPOLOGY ── */
.topo-node{display:inline-flex;align-items:center;gap:7px;padding:7px 12px;background:var(--bg-3);border:1px solid var(--border);border-radius:7px;font-size:11px;color:var(--t2);cursor:pointer;transition:all .15s}
.topo-node:hover,.topo-node.active{border-color:var(--acc);color:var(--text)}
.topo-arrow{color:var(--t3);font-size:13px;margin:0 3px}

/* ── EMPTY ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;color:var(--t3);text-align:center;gap:7px}
.empty-icon{font-size:28px;margin-bottom:3px}
.empty-title{font-family:var(--sans);font-size:13px;font-weight:600;color:var(--t2)}
.empty-sub{font-size:11px}

/* ── DIFF VIEW ── */
.diff-panel{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.diff-before{background:rgba(232,76,61,.04);border:1px solid rgba(232,76,61,.15);border-radius:5px;padding:10px;font-size:10px;font-family:var(--mono);color:var(--t2);white-space:pre-wrap;max-height:200px;overflow-y:auto}
.diff-after{background:rgba(39,174,96,.04);border:1px solid rgba(39,174,96,.15);border-radius:5px;padding:10px;font-size:10px;font-family:var(--mono);color:var(--t2);white-space:pre-wrap;max-height:200px;overflow-y:auto}

/* ── SPINNER ── */
.spin{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.muted{color:var(--t3)}
.mono{font-family:var(--mono)}
.row{display:flex;gap:7px;align-items:center}
.col{display:flex;flex-direction:column;gap:8px}
.flex-1{flex:1}
.text-sm{font-size:10px}
.sep{height:1px;background:var(--border);margin:8px 0}
</style>
</head>
<body><div id="root"></div>
<script>
// ═══════════════════════════════════════════════════════════════
//  OPENCLAW MISSION CONTROL — PHASE 2
//  Repository-native. All data from real gateway methods.
// ═══════════════════════════════════════════════════════════════
const {createElement:h,useState,useEffect,useRef,useCallback,useMemo,Fragment,useReducer} = React;

// ── GATEWAY CLIENT ─────────────────────────────────────────────
class GW {
  constructor(url,token){this.url=url;this.token=token;this.ws=null;this.pending=new Map();this.seq=0;this.listeners=new Map();this.connected=false;}
  on(ev,fn){if(!this.listeners.has(ev))this.listeners.set(ev,new Set());this.listeners.get(ev).add(fn);return()=>this.listeners.get(ev)?.delete(fn);}
  emit(ev,d){this.listeners.get(ev)?.forEach(fn=>fn(d));}
  connect(){
    return new Promise((res,rej)=>{
      try{this.ws=new WebSocket(this.url);}catch(e){rej(new Error('Invalid URL'));return;}
      const t=setTimeout(()=>{this.ws?.close();rej(new Error('Connection timeout (8s)'));},8000);
      this.ws.onopen=()=>{
        clearTimeout(t);
        this.ws.send(JSON.stringify({type:'request',seq:++this.seq,method:'connect',params:{
          minProtocol:1,maxProtocol:99,
          client:{id:'mc-'+Math.random().toString(36).slice(2),displayName:'Mission Control v2',version:'2.0.0',platform:'browser',mode:'ui'},
          ...(this.token?{auth:{token:this.token}}:{})
        }}));
        this.connected=true;res(this);this.emit('connect',{});
      };
      this.ws.onmessage=(e)=>{
        try{
          const m=JSON.parse(e.data);
          if(m.type==='response'&&m.seq){const p=this.pending.get(m.seq);if(p){this.pending.delete(m.seq);m.ok?p.res(m.result):p.rej(new Error(m.error?.message||'Request failed'));}}
          else if(m.type==='event')this.emit('event',m);
        }catch{}
      };
      this.ws.onerror=(e)=>{clearTimeout(t);this.emit('error',e);rej(new Error('WebSocket connection failed'));};
      this.ws.onclose=(e)=>{this.connected=false;this.pending.forEach(p=>p.rej(new Error('Disconnected')));this.pending.clear();this.emit('disconnect',{code:e.code,reason:e.reason});};
    });
  }
  req(method,params={}){
    return new Promise((res,rej)=>{
      if(!this.ws||this.ws.readyState!==WebSocket.OPEN){rej(new Error('Not connected'));return;}
      const seq=++this.seq;this.pending.set(seq,{res,rej});
      this.ws.send(JSON.stringify({type:'request',seq,method,params}));
      setTimeout(()=>{if(this.pending.has(seq)){this.pending.delete(seq);rej(new Error('Request timeout'));}},18000);
    });
  }
  disconnect(){this.ws?.close();this.ws=null;this.connected=false;}
}

// ── TOOL POLICY PANEL ──────────────────────────────────────────
// Writes back through config.patch to persist tool policy into openclaw.json
function ToolPolicyPanel({agentId,configRaw,configHash,configLoading,client,isDemo,onConfigRefresh}){
  const[toolsEnabled,setToolsEnabled]=useState(()=>{const m={};MOCK_TOOLS.forEach(t=>{m[t.id]=!['exec','browser'].includes(t.id)});return m;});
  const[saving,setSaving]=useState(false);
  const[msg,setMsg]=useState('');
  const toolGroups=useMemo(()=>{const g={};MOCK_TOOLS.forEach(t=>{if(!g[t.group])g[t.group]=[];g[t.group].push(t)});return g;},[]);
  const enabledCount=Object.values(toolsEnabled).filter(Boolean).length;

  const savePatch=async()=>{
    setSaving(true);setMsg('');
    const deny=MOCK_TOOLS.filter(t=>!toolsEnabled[t.id]).map(t=>t.id);
    const alsoAllow=MOCK_TOOLS.filter(t=>toolsEnabled[t.id]&&['exec','browser'].includes(t.id)).map(t=>t.id);
    // Build a minimal JSON5 config patch for this agent's tool policy
    // config.patch uses JSON Merge Patch applied to the config
    const patchObj={agents:{list:[{id:agentId,tools:{deny,alsoAllow}}]}};
    try{
      if(!isDemo&&client&&configHash){
        await client.req('config.patch',{raw:JSON.stringify(patchObj),baseHash:configHash,note:`Mission Control: tool policy for ${agentId}`});
        pushAudit('update','config.patch',`${agentId} tool policy — deny:[${deny.join(',')}]`);
      } else {
        pushAudit('update','config.patch',`${agentId} tool policy (demo) — deny:[${deny.join(',')}]`);
      }
      setMsg('Tool policy saved to config');
      if(onConfigRefresh)onConfigRefresh();
    }catch(e){setMsg('Error: '+e.message);}
    setSaving(false);
  };

  return h('div',{className:'card'},
    h('div',{className:'ch'},
      h('span',{className:'ct'},'Tool Access Policy'),
      h('div',{className:'row',style:{gap:6}},
        h('span',{style:{fontSize:10,color:'var(--t3)'}},[`${enabledCount}/${MOCK_TOOLS.length} enabled`]),
        h('button',{className:'btn btn-sm',onClick:()=>{const a={};MOCK_TOOLS.forEach(t=>a[t.id]=true);setToolsEnabled(a);}},'All On'),
        h('button',{className:'btn btn-sm',onClick:()=>{const a={};MOCK_TOOLS.forEach(t=>a[t.id]=false);setToolsEnabled(a);}},'All Off')
      )
    ),
    h('div',{className:'cb'},
      msg&&h('div',{className:`callout ${msg.startsWith('Error')?'c-err':'c-ok'}`,style:{marginBottom:10}},msg),
      h('div',{className:'callout c-info',style:{marginBottom:12,fontSize:10}},
        'Changes persist via ',h('code',null,'config.patch'),' with merge patch. The gateway validates the patch before writing. baseHash prevents concurrent overwrites.'
      ),
      Object.entries(toolGroups).map(([group,tools])=>h('div',{key:group,style:{marginBottom:14}},
        h('div',{style:{fontSize:9,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.09em',marginBottom:6}},group),
        h('div',{className:'tool-g'},
          tools.map(tool=>h('div',{key:tool.id,className:'tool-item'},
            h('div',null,h('div',{className:'tool-name'},tool.id),h('div',{className:'tool-desc'},tool.desc)),
            h('button',{className:`toggle ${toolsEnabled[tool.id]?'on':''}`,onClick:()=>setToolsEnabled(p=>({...p,[tool.id]:!p[tool.id]}))})
          ))
        )
      )),
      h('div',{className:'sep'}),
      h('div',{className:'btn-row',style:{justifyContent:'flex-end'}},
        h('button',{className:'btn btn-prim',onClick:savePatch,disabled:saving||configLoading},saving?'Saving…':'Save Policy via config.patch')
      )
    )
  );
}

function AgentFilesTab({agentId,client,isDemo}){
  const[files,setFiles]=useState(null);
  const[content,setContent]=useState({});
  const[draft,setDraft]=useState({});
  const[active,setActive]=useState(null);
  const[saving,setSaving]=useState(false);
  const[err,setErr]=useState('');
  const[loading,setLoading]=useState(false);

  const load=async()=>{
    setLoading(true);
    if(isDemo){setFiles({agentId,workspace:`~/.openclaw/agents/${agentId}`,files:MOCK_FILES});setLoading(false);return;}
    try{const r=await client.req('agents.files.list',{agentId});setFiles(r);}catch(e){setErr(e.message);}
    setLoading(false);
  };

  const loadFile=async(name)=>{
    if(content[name]!==undefined)return;
    if(isDemo){setContent(p=>({...p,[name]:name==='SOUL.md'?SOUL_TPL:`# ${name}\n\nContents of ${name} for ${agentId}\n`}));return;}
    try{const r=await client.req('agents.files.get',{agentId,name});setContent(p=>({...p,[name]:r.file.content||''}));}catch{}
  };

  const save=async(name)=>{
    const body=draft[name]??content[name]??'';
    setSaving(true);
    try{
      if(!isDemo&&client)await client.req('agents.files.set',{agentId,name,content:body});
      pushAudit('update','agents.files.set',`${agentId}/${name} — saved`);
      setContent(p=>({...p,[name]:body}));setDraft(p=>{const n={...p};delete n[name];return n;});
    }catch(e){setErr(e.message);}

    h('div',{className:'cb',style:{display:'grid',gridTemplateColumns:'185px 1fr',gap:14,minHeight:340}},

        files.files.map(f=>h('div',{key:f.name,className:`fr ${active===f.name?'active':''}`,onClick:()=>{setActive(f.name);loadFile(f.name);}},
          h('div',{style:{flex:1}},h('div',{className:'fn'},f.name),h('div',{className:'fm'},f.missing?'missing':`${fmtB(f.size)} · ${fmtT(f.updatedAtMs)}`)),
          f.missing&&h('span',{className:'pill p-warn',style:{fontSize:8}},'missing'),
          draft[f.name]!==undefined&&h('span',{className:'pill p-blue',style:{fontSize:8}},'unsaved')
        ))
      ),
      active
        ?h('div',{className:'editor-wrap'},
            h('div',{className:'editor-toolbar'},
              h('span',{className:'editor-path'},`${files.workspace}/${active}`),
              h('div',{className:'btn-row'},
                h('button',{className:'btn btn-sm',onClick:()=>setDraft(p=>{const n={...p};delete n[active];return n;}),disabled:draft[active]===undefined},'Reset'),
                h('button',{className:'btn btn-prim btn-sm',onClick:()=>save(active),disabled:saving||draft[active]===undefined},saving?'Saving…':'Save')
              )
            ),
            h('textarea',{className:'editor-area',value:draft[active]??content[active]??'',onChange:e=>setDraft(p=>({...p,[active]:e.target.value})),spellCheck:false})
          )

        ?h('div',{className:'empty'},h('div',{className:'empty-icon'},'⏰'),h('div',{className:'empty-title'},'No jobs for this agent'),h('div',{className:'empty-sub'},'Switch to the Cron tab to add one'))
        :h('div',{className:'col',style:{gap:8}},
          agentCron.map(job=>h('div',{key:job.id||job.name,className:'cron-item'},
            h('div',{className:'cron-info'},
              h('div',{className:'cron-name'},job.name),
              h('div',{className:'cron-sched'},cronScheduleLabel(job.schedule)),
              job.description&&h('div',{className:'cron-desc'},job.description),
              h('div',{className:'cron-meta'},
                h('span',{className:`pill ${job.enabled?'p-ok':'p-off'}`},job.enabled?'enabled':'disabled'),
                h('span',{className:'pill p-blue'},job.sessionTarget)
              ),
              h('div',{className:'cron-state'},
                h('span',{className:'sl'},'last run'),h('span',{className:'sv'},fmtT(job.state?.lastRunAtMs)),
                h('span',{className:'sl'},'status'),h('span',{className:`sv ${job.state?.lastStatus==='error'?'c-red':'c-green'}`},cronLastStatus(job.state)||'-')
              )
            ),
            h('div',{className:'btn-row',style:{flexDirection:'column',gap:4,alignItems:'flex-end'}},
              h('button',{className:`btn btn-sm ${job.enabled?'btn-danger':'btn-ok'}`,onClick:async()=>{
                const patch={...job,enabled:!job.enabled};
                if(!isDemo&&client)try{await client.req('cron.update',{id:job.id,patch:{enabled:!job.enabled}});}catch{}
                pushAudit('update','cron.update',`${job.name} — enabled=${!job.enabled}`);
                setCronJobs(prev=>prev.map(j=>(j.id||j.name)===(job.id||job.name)?patch:j));
              }},job.enabled?'Disable':'Enable')
            )
          ))
        )
    ),
    tab==='policy'&&h('div',{className:'card'},
      h('div',{className:'ch'},h('span',{className:'ct'},'Governance & Guardrails')),
      h('div',{className:'cb'},
        h('div',{className:'col',style:{gap:14}},
          h('div',{className:'field'},h('label',null,'Human Approval Required'),h('select',null,h('option',{value:'off'},'Off — agent acts autonomously'),h('option',{value:'exec'},'Required for exec/shell commands'),h('option',{value:'external'},'Required for external actions'),h('option',{value:'all'},'Required for all actions'))),
          h('div',{className:'field'},h('label',null,'Sandbox Mode'),h('select',null,h('option',{value:'off'},'Off — unrestricted'),h('option',{value:'non-main'},'Sandbox non-main agents'),h('option',{value:'all'},'Sandbox all agents'))),
          h('div',{className:'field'},h('label',null,'Workspace Access in Sandbox'),h('select',null,h('option',{value:'rw'},'Read/Write'),h('option',{value:'ro'},'Read-Only'),h('option',{value:'none'},'No Access'))),
          h('div',{className:'field'},h('label',null,'Blocked Actions (one per line)'),h('textarea',{placeholder:'exec\nbrowser\nimage',rows:3})),
          h('div',{className:'callout c-info',style:{fontSize:10}},'These guardrails constrain agent capabilities. Writes via ',h('code',null,'config.patch'),' with hash guard.'),
          h('div',{className:'btn-row',style:{justifyContent:'flex-end'}},h('button',{className:'btn btn-prim',onClick:saveAgent},'Save Policy'))
        )
      )
    )
  );
}

// ── CREATE AGENT MODAL ─────────────────────────────────────────
function CreateModal({onClose,onCreate,client,isDemo}){
  const[name,setName]=useState('');
  const[ws,setWs]=useState('');
  const[emoji,setEmoji]=useState('');
  const[model,setModel]=useState('');
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState('');
  const go=async()=>{
    if(!name.trim()){setErr('Name required');return;}
    setLoading(true);setErr('');
    try{
      const workspace=ws.trim()||`~/.openclaw/agents/${name.trim().toLowerCase().replace(/\s+/g,'-')}`;
      if(!isDemo&&client)await client.req('agents.create',{name:name.trim(),workspace,...(emoji?{emoji}:{})});
      pushAudit('create','agents.create',`${name.trim()} — workspace: ${workspace}`);
      onCreate({id:name.trim().toLowerCase().replace(/\s+/g,'-'),name:name.trim(),isDefault:false,identity:{name:name.trim(),emoji:emoji||'🤖',theme:''}});
    }catch(e){setErr(e.message);}
    setLoading(false);
  };
  return h('div',{className:'overlay',onClick:e=>e.target===e.currentTarget&&onClose()},
    h('div',{className:'modal'},
      h('h2',null,'+ New Agent'),
      h('p',{className:'modal-sub'},'Creates workspace and bootstrap files via ',h('code',null,'agents.create')),
      err&&h('div',{className:'callout c-err'},err),
      h('div',{className:'field'},h('label',null,'Agent Name *'),h('input',{value:name,onChange:e=>setName(e.target.value),placeholder:'Code Reviewer',autoFocus:true})),
      h('div',{className:'field'},h('label',null,'Workspace Path'),h('input',{value:ws,onChange:e=>setWs(e.target.value),placeholder:'~/.openclaw/agents/my-agent'})),
      h('div',{className:'g2'},
        h('div',{className:'field'},h('label',null,'Emoji'),h('input',{value:emoji,onChange:e=>setEmoji(e.target.value),placeholder:'🤖',maxLength:4})),
        h('div',{className:'field'},h('label',null,'Model (optional)'),h('input',{value:model,onChange:e=>setModel(e.target.value),placeholder:'anthropic/claude-opus-4-6'}))
      ),
      h('div',{className:'callout c-info',style:{fontSize:10}},'📁 SOUL.md, IDENTITY.md, TOOLS.md, AGENTS.md, MEMORY.md will be generated automatically.'),
      h('div',{className:'btn-row',style:{justifyContent:'flex-end'}},
        h('button',{className:'btn',onClick:onClose},'Cancel'),
        h('button',{className:'btn btn-prim',onClick:go,disabled:loading},loading?'Creating…':'Create Agent')
      )
    )
  );
}

// ── MAIN APP ──────────────────────────────────────────────────
function App(){
  const[view,setView]=useState('connect');
  const[isDemo,setIsDemo]=useState(false);
  const[client,setClient]=useState(null);
  const[gwStatus,setGwStatus]=useState('disconnected');
  const[agents,setAgents]=useState([]);
  const[selectedId,setSelectedId]=useState(null);
  const[nav,setNav]=useState('overview'); // overview|fleet|agent|topology|cron|sessions
  const[filter,setFilter]=useState('');
  const[showCreate,setShowCreate]=useState(false);
  const[health,setHealth]=useState(null);
  const[healthLoading,setHealthLoading]=useState(false);
  const[cronJobs,setCronJobs]=useState([]);
  const[cronLoading,setCronLoading]=useState(false);
  const[sessions,setSessions]=useState([]);
  const[sessLoading,setSessLoading]=useState(false);
  const[auditLog,setAuditLog]=useState(AUDIT_LOG);
  // Config state (for tool policy + topology patch)
  const[configRaw,setConfigRaw]=useState(null);
  const[configHash,setConfigHash]=useState(null);
  const[configLoading,setConfigLoading]=useState(false);

  // Sync audit log from global every 2 seconds
  useEffect(()=>{const t=setInterval(()=>setAuditLog([...AUDIT_LOG]),2000);return()=>clearInterval(t);},[]);

  const loadAgents=useCallback(async(gc,demo)=>{
    if(demo){const a=MOCK_AGENTS.map((x,i)=>({...x,isDefault:i===0}));setAgents(a);setSelectedId(a[0].id);return;}
    try{const r=await gc.req('agents.list',{});const a=r.agents.map(x=>({...x,isDefault:x.id===r.defaultId}));setAgents(a);setSelectedId(a[0]?.id||null);}
    catch{const a=MOCK_AGENTS.map((x,i)=>({...x,isDefault:i===0}));setAgents(a);setSelectedId(a[0].id);}
  },[]);

  const loadHealth=useCallback(async()=>{
    if(isDemo){setHealth(MOCK_HEALTH);return;}
    if(!client)return;
    setHealthLoading(true);
    try{const h=await client.req('health',{});setHealth(h);}
    catch{setHealth(MOCK_HEALTH);}
    setHealthLoading(false);
  },[client,isDemo]);

  const loadCron=useCallback(async()=>{
    setCronLoading(true);
    if(isDemo){setCronJobs(MOCK_CRON);setCronLoading(false);return;}
    if(!client){setCronLoading(false);return;}
    try{const r=await client.req('cron.list',{includeDisabled:true});setCronJobs(r.jobs||[]);}
    catch{setCronJobs(MOCK_CRON);}
    setCronLoading(false);
  },[client,isDemo]);

  const loadSessions=useCallback(async()=>{
    setSessLoading(true);
    if(isDemo){setSessions(MOCK_SESSIONS);setSessLoading(false);return;}
    if(!client){setSessLoading(false);return;}
    try{const r=await client.req('sessions.list',{limit:50,includeDerivedTitles:false});setSessions(r.sessions||[]);}
    catch{setSessions(MOCK_SESSIONS);}
    setSessLoading(false);
  },[client,isDemo]);

  const loadConfig=useCallback(async()=>{
    if(isDemo)return;
    if(!client)return;
    setConfigLoading(true);
    try{
      const r=await client.req('config.get',{});
      setConfigRaw(r.raw);
      setConfigHash(r.hash||r.baseHash||null);
    }catch{}
    setConfigLoading(false);
  },[client,isDemo]);

  const handleConnect=useCallback(async(gc)=>{
    setClient(gc);setGwStatus('connected');setIsDemo(false);setView('main');
    gc.on('disconnect',()=>setGwStatus('disconnected'));
    gc.on('event',ev=>{
      if(ev?.data?.method){pushAudit('event',ev.data.method,ev.data.detail||JSON.stringify(ev.data).slice(0,60));}
    });
    await loadAgents(gc,false);
    // Load data eagerly
    try{const h=await gc.req('health',{});setHealth(h);}catch{setHealth(MOCK_HEALTH);}
    try{const r=await gc.req('cron.list',{includeDisabled:true});setCronJobs(r.jobs||[]);}catch{setCronJobs(MOCK_CRON);}
    try{const r=await gc.req('sessions.list',{limit:50});setSessions(r.sessions||[]);}catch{setSessions(MOCK_SESSIONS);}
    try{const r=await gc.req('config.get',{});setConfigRaw(r.raw);setConfigHash(r.hash||r.baseHash||null);}catch{}
  },[loadAgents]);

  const enterDemo=useCallback(()=>{
    setIsDemo(true);setGwStatus('disconnected');setView('main');
    loadAgents(null,true);setHealth(MOCK_HEALTH);setCronJobs(MOCK_CRON);setSessions(MOCK_SESSIONS);
  },[loadAgents]);

  const doDisconnect=useCallback(()=>{client?.disconnect();setClient(null);setView('connect');setGwStatus('disconnected');setAgents([]);setSelectedId(null);setHealth(null);setCronJobs([]);setSessions([]);},[client]);

  const filtered=useMemo(()=>{if(!filter.trim())return agents;const q=filter.toLowerCase();return agents.filter(a=>agentLabel(a).toLowerCase().includes(q)||a.id.toLowerCase().includes(q));},[agents,filter]);
  const selectedAgent=useMemo(()=>agents.find(a=>a.id===selectedId)||null,[agents,selectedId]);

  if(view==='connect')return h('div',{style:{height:'100vh',background:'var(--bg)'}},h(ConnectScreen,{onConnect:handleConnect,onDemo:enterDemo}));

  // Sidebar content based on nav
  const sidebarItems=()=>{
    if(nav==='fleet'||nav==='agent')return filtered.map(a=>h('div',{key:a.id,className:`sb-item ${selectedId===a.id&&nav==='agent'?'active':''}`,onClick:()=>{setSelectedId(a.id);setNav('agent');}},h('div',{className:'sb-avatar'},agentEmoji(a)),h('div',{className:'sb-info'},h('div',{className:'sb-name'},agentLabel(a)),h('div',{className:'sb-sub'},a.id)),h('div',{className:`sb-dot ${a.isDefault?'acc':'on'}`})));
    if(nav==='cron'||nav==='cron-detail')return cronJobs.map(j=>h('div',{key:j.id||j.name,className:'sb-item',onClick:()=>{}},h('div',{className:'sb-avatar'},'⏰'),h('div',{className:'sb-info'},h('div',{className:'sb-name'},j.name),h('div',{className:'sb-sub'},cronScheduleLabel(j.schedule))),h('div',{className:`sb-dot ${j.enabled?'on':''}`})));
    if(nav==='sessions')return sessions.map(s=>h('div',{key:s.key,className:'sb-item'},h('div',{className:'sb-avatar'},'💬'),h('div',{className:'sb-info'},h('div',{className:'sb-name'},s.agentId||s.key),h('div',{className:'sb-sub'},fmtT(s.updatedAtMs)))));
    if(nav==='topology')return agents.map(a=>h('div',{key:a.id,className:'sb-item'},h('div',{className:'sb-avatar'},agentEmoji(a)),h('div',{className:'sb-info'},h('div',{className:'sb-name'},agentLabel(a)),h('div',{className:'sb-sub'},'↔ all'))));
    return [
      h('div',{key:'dash',className:'sb-item'},h('div',{className:'sb-avatar'},'▤'),h('div',{className:'sb-info'},h('div',{className:'sb-name'},'Fleet Overview'),h('div',{className:'sb-sub'},'stats & health'))),
      h('div',{key:'aud',className:'sb-item'},h('div',{className:'sb-avatar'},'📋'),h('div',{className:'sb-info'},h('div',{className:'sb-name'},'Audit Trail'),h('div',{className:'sb-sub'},'change history'))),
    ];
  };

  const topTitle=nav==='agent'&&selectedAgent?agentLabel(selectedAgent):nav==='topology'?'Collaboration Topology':nav==='cron'?'Scheduled Jobs':nav==='sessions'?'Sessions':nav==='fleet'?'Agent Fleet':'Fleet Overview';

  return h('div',{className:'shell'},
    // RAIL
    h('div',{className:'rail'},
      h('div',{className:'rail-logo'},'🦞'),
      h('div',{className:'rail-sep'}),
      h('button',{className:`rail-btn ${nav==='overview'?'active':''}`,title:'Fleet Overview',onClick:()=>setNav('overview')},'▤'),
      h('button',{className:`rail-btn ${nav==='fleet'||nav==='agent'?'active':''}`,title:'Agents',onClick:()=>setNav('fleet')},'◆'),
      h('button',{className:`rail-btn ${nav==='topology'?'active':''}`,title:'Topology',onClick:()=>setNav('topology')},'⬡'),
      h('button',{className:`rail-btn ${nav==='cron'?'active':''}`,title:'Cron Jobs',onClick:()=>{setNav('cron');loadCron();}},'⏰'),
      h('button',{className:`rail-btn ${nav==='sessions'?'active':''}`,title:'Sessions',onClick:()=>{setNav('sessions');loadSessions();}},'💬'),
      h('div',{className:'rail-spacer'}),
      h('button',{className:'rail-btn',title:'Disconnect',onClick:doDisconnect},'⏏')
    ),
    // SIDEBAR
    h('div',{className:'sidebar'},
      h('div',{className:'sb-head'},
        h('div',{className:'sb-head-title'},nav==='topology'?'Topology':nav==='sessions'?'Sessions':nav==='cron'?'Cron Jobs':nav==='overview'?'Overview':'Agents'),
        h('div',{className:'sb-head-count'},`${agents.length} agent${agents.length===1?'':'s'} · ${isDemo?'demo':'live'}`)
      ),
      (nav==='fleet'||nav==='agent')&&h('div',{className:'sb-search'},h('input',{value:filter,onChange:e=>setFilter(e.target.value),placeholder:'Search agents…'})),
      h('div',{className:'sb-list'},sidebarItems()),
      (nav==='fleet'||nav==='agent')&&h('button',{className:'sb-add',onClick:()=>setShowCreate(true)},'+ New Agent')
    ),
    // MAIN
    h('div',{className:'main'},
      h('div',{className:'topbar'},
        h('div',{className:'topbar-title'},topTitle),
        h('div',{className:'row',style:{gap:8,flexShrink:0}},
          h('div',{className:'status-row'},h('div',{className:`sdot ${isDemo?'yellow':gwStatus==='connected'?'green':'red'}`}),h('span',{style:{fontSize:10,color:'var(--t3)',fontFamily:'var(--mono)'}},isDemo?'DEMO':gwStatus==='connected'?'LIVE':'OFFLINE'))
        )
      ),
      h('div',{className:'content'},
        nav==='agent'&&selectedAgent?h(AgentDetail,{agent:selectedAgent,client,isDemo,onUpdated:()=>loadAgents(client,isDemo),configRaw,configHash,configLoading,onConfigRefresh:loadConfig,cronJobs,setCronJobs,onCronLoad:loadCron,cronLoading}):
        nav==='topology'?h(TopologyTab,{agents,configRaw,configHash,client,isDemo,onConfigRefresh:loadConfig}):
        nav==='cron'?h(CronTab,{cronJobs,setCronJobs,loading:cronLoading,onLoad:loadCron,agents,client,isDemo}):
        nav==='sessions'?h(SessionsTab,{sessions,loading:sessLoading,onLoad:loadSessions,agents,client,isDemo}):
        h(OverviewTab,{agents,cronJobs,sessions,health,healthLoading,onRefreshHealth:loadHealth,isDemo,auditLog})
      )
    ),
    showCreate&&h(CreateModal,{onClose:()=>setShowCreate(false),onCreate:a=>{setAgents(prev=>[...prev,a]);setSelectedId(a.id);setNav('agent');setShowCreate(false);},client,isDemo}),
    isDemo&&h('div',{className:'conn-banner'},h('div',{className:'sdot yellow'}),h('div',{className:'conn-text'},h('div',{style:{fontWeight:600,fontSize:11}},'Demo Mode'),h('div',{style:{fontSize:9,color:'var(--t3)',marginTop:2}},'Simulating real gateway. No data is persisted.')),h('button',{className:'conn-close',onClick:doDisconnect},'✕'))
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>

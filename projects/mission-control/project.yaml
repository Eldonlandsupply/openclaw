slug: mission-control
name: "OpenClaw Mission Control"
status: active
priority: high
owner: Eldonlandsupply
created: "2026-03-15"
updated: "2026-03-15"
operating_mode: always-on

description: >
  Web-based operational control plane for the OpenClaw agent ecosystem.
  Single-page HTML/CSS/JS application that connects directly to the OpenClaw
  gateway via WebSocket and speaks the native gateway protocol (request/response
  frames, real-time events). This is the canonical operator interface for agent
  creation, editing, policy management, siloing, collaboration, deployment,
  monitoring, governance, and lifecycle management.


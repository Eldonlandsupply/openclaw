name: Setup pnpm + store cache
description: Prepare pnpm via corepack and restore pnpm store cache.
inputs:
  pnpm-version:
    description: pnpm version to activate via corepack. If empty, use packageManager from package.json.
    required: false
    default: ""
  cache-key-suffix:
    description: Suffix appended to the cache key.
    required: false
    default: "node22"
runs:
  using: composite
  steps:
    - name: Setup pnpm (corepack retry)
      shell: bash
      run: |
        set -euo pipefail
        corepack enable
        PNPM_VERSION="${{ inputs.pnpm-version }}"
        if [ -z "$PNPM_VERSION" ]; then
          PNPM_VERSION="$(node -p "const pm=require('./package.json').packageManager || ''; const m=pm.match(/^pnpm@(.*)$/); if(!m) throw new Error('package.json packageManager must be set to pnpm@<version>'); m[1]")"
          echo "Resolved pnpm@$PNPM_VERSION from package.json packageManager"
        fi
        for attempt in 1 2 3; do
          if corepack prepare "pnpm@$PNPM_VERSION" --activate; then
            pnpm -v
            exit 0
          fi
          echo "corepack prepare failed (attempt $attempt/3). Retrying..."
          sleep $((attempt * 10))
        done
        exit 1

    - name: Resolve pnpm store path
      id: pnpm-store
      shell: bash
      run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

    - name: Restore pnpm store cache
      uses: actions/cache@v4
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: ${{ runner.os }}-pnpm-store-${{ inputs.cache-key-suffix }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-${{ inputs.cache-key-suffix }}-
